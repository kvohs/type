name: Release

# Builds a signed + notarized universal macOS .dmg and attaches it to a draft
# GitHub Release. Triggered when you push a vX.Y.Z tag, or manually from the
# Actions tab. Requires these repo secrets: CSC_LINK (base64 .p12), CSC_KEY_PASSWORD,
# APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v1.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Resolve which ref to build
        id: ref
        run: |
          REF="${{ inputs.tag }}"
          [ -z "$REF" ] && REF="${GITHUB_REF#refs/tags/}"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build signed + notarized universal .dmg
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist -- --publish never

      - name: Show what was built
        run: ls -lh dist

      - name: Attach the .dmg + auto-update manifest to a draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          name: type ${{ steps.ref.outputs.tag }}
          draft: true
          # latest-mac.yml = the auto-update manifest electron-updater reads
          # *.zip = the actual update artifact MacUpdater downloads (dmg can't
          # be used for in-place updates on macOS — needs to be a zip of the .app)
          # *.dmg = first-time downloads from kellyvohs.com/type
          files: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          body: |
            ## type ${{ steps.ref.outputs.tag }}

            A single sheet of paper. Type, then keep it or burn it.

            ### What's new
            - Auto-updates from GitHub Releases — type checks on launch and prompts when a new version is ready
            - Three themes: Light, Amber phosphor, Dispatch
            - Zen mode (fullscreen) and Stay-on-top
            - Smolder: the page chars if you stop typing; cools when you resume. Configurable delay (10 / 30 / 60 / 120s)
            - Burn now with ⌘B
            - First-run onboarding that hands off into an opening quote
            - Quotes on launch and on every burn, with a hover-× to drop one
            - Share a quote as a phone-wallpaper PNG (hover the quote → share icon → AirDrop, Messages, Notes, Mail)
            - Overstrike: ↑ lifts the cursor onto a prior line; x covers a character and advances. ↓ returns to writing.
            - Word count + writing timer
            - Auto-saved drafts survive crashes and restarts
            - Save to a folder of your choice as a dated `.md`
            - Current-line editing: ⌫ char, ⌥⌫ word, ⌘⌫ wipe line. Committed lines stay locked.

            ### Install
            1. Download `type-universal.dmg` below
            2. Open it, drag **type** into Applications
            3. Double-click "type" from Applications. You're in.

            (Build is signed with a Developer ID Application certificate and notarized by Apple.)
