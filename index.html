<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>type</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #ffffff;
    --ink: #121316;
    --ink-soft: #2c2d32;
    --ink-quiet: #7c7f86;
    --ink-faint: #c2c4c9;
    --rule: #e5e6e9;
    --panel: #ffffff;
    --panel-shadow: rgba(40,36,30,.4);
    --sw-off: #e0e1e4;
    --emboss: rgba(255,255,255,.8);
    --ember: #b05f4a;
    --accent: #df5a26;
    --line-h: 2.05em;
    --type-size: 18px;
    --line-px: calc(var(--type-size) * 2.05);   /* fixed row height so smaller lines still occupy one row */
    --mono: "Courier Prime", "Courier New", ui-monospace, monospace;
  }

  body.dark {
    --paper: #141519;        /* coop brand dark — a soft near-black, not true black */
    --ink: #e7e8ea;
    --ink-soft: #c4c6cb;
    --ink-quiet: #888b92;
    --ink-faint: #3f424a;
    --rule: #2a2c32;
    --panel: #1c1e23;
    --panel-shadow: rgba(0,0,0,.6);
    --sw-off: #3a3d44;
    --emboss: rgba(0,0,0,.45);
  }

  body.amber {                 /* phosphor — a muted amber CRT, not neon */
    --paper: #161009;
    --ink: #d69a4a;
    --ink-soft: #b37e3a;
    --ink-quiet: #835f30;
    --ink-faint: #463210;
    --rule: #352712;
    --panel: #1c1509;
    --panel-shadow: rgba(0,0,0,.6);
    --sw-off: #352712;
    --emboss: rgba(0,0,0,.45);
    --ember: #cf6d28;
    --accent: #d9883a;
  }
  /* faint phosphor warmth, not a glow */
  body.amber .feed,
  body.amber .intro,
  body.amber .stamp .date { text-shadow: 0 0 3px rgba(214,154,74,.18); }

  body.dispatch {              /* WWII field dispatch — typed on warm aged parchment */
    --paper: #e7dcc1;          /* warm parchment, not the old olive-khaki */
    --ink: #2a2418;            /* faded ribbon black, warm */
    --ink-soft: #463d2a;
    --ink-quiet: #7a6e52;
    --ink-faint: #ad9f7c;
    --rule: #cdc09c;
    --panel: #f1e8d0;
    --panel-shadow: rgba(60,48,24,.4);
    --sw-off: #cdc09c;
    --emboss: rgba(255,250,235,.6);
    --ember: #9c4a2c;
    --accent: #9c3a2a;         /* classified-stamp red */
    /* uneven aging that darkens toward the edges */
    background-image: radial-gradient(125% 100% at 50% 0%, rgba(0,0,0,0) 56%, rgba(74,56,28,.14) 100%);
  }
  /* slightly heavy, imperfect ink to read like a struck ribbon */
  body.dispatch .feed,
  body.dispatch .intro,
  body.dispatch .stamp .date { text-shadow: 0 .5px 0 rgba(42,36,24,.28); }


  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--paper);
    color: var(--ink);
    cursor: default;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background-color .35s ease, color .35s ease;
  }
  /* hide the mouse pointer while the keyboard is in use — keeps it from
     hovering in the middle of the page when you tab back from another app.
     Any mouse movement brings it right back. */
  body.cursor-idle, body.cursor-idle * { cursor: none !important; }

  /* a whisper of vignette on every theme — a little focus, a little age (sits behind the text) */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(118% 96% at 50% 44%, rgba(0,0,0,0) 56%, rgba(0,0,0,.055) 100%);
  }

  .stage {
    position: relative;
    width: 100%; height: 100%;
  }

  /* Invisible drag handle along the top of the window. With titleBarStyle:
     "hiddenInset" there's no chrome to grab when the window gets small —
     this strip gives macOS a draggable region. Transparent, no visual,
     just lets you grab and move the window from the top edge. The 78px
     left offset clears the traffic lights so they keep working. */
  .window-drag {
    position: fixed; top: 0; left: 78px; right: 0; height: 28px;
    -webkit-app-region: drag;
    z-index: 50;
  }

  /* ---------- typing window ---------- */
  .platen {
    position: absolute; inset: 0;
    overflow: hidden;
    /* the active line sits at the vertical middle; everything above it fades up
       under a soft veil (the locked, uneditable past) */
    -webkit-mask-image: linear-gradient(to bottom, transparent 3%, #000 48%, #000 100%);
            mask-image: linear-gradient(to bottom, transparent 3%, #000 48%, #000 100%);
  }

  .feed {
    position: absolute;
    top: calc(50% - 1.02em);        /* strike point — active line's center sits on the screen middle */
    left: 50%;                      /* centered column — typing lives in the middle of the screen */
    transform: translateX(-50%);
    width: min(64ch, 84vw);         /* caps at the measure on big screens; uses most of a small one */
    font-family: var(--mono);
    font-size: var(--type-size);
    line-height: var(--line-px);
    color: var(--ink);
  }
  .feed-inner {
    transition: transform .15s cubic-bezier(.22,.61,.25,1);
    will-change: transform;
  }
  /* on save: page pulls off the platen — gentle engaged motion at first
     (you can see the paper start to come up), then accelerates and rips
     out at the end. easeInQuart curve. */
  .feed-inner.eject { transition: transform .55s cubic-bezier(.895,.03,.685,.22) !important; }
  /* a frozen copy of the welcome that fades in place while the quote types in fresh */
  .feed-inner.ghost { position: absolute; left: 0; right: 0; top: 0; transition: opacity .8s ease, transform .8s ease; pointer-events: none; }

  .line {
    min-height: var(--line-h);
    white-space: pre-wrap;
    /* overflow-wrap: break-word — only break mid-word as a last resort.
       word-break: break-word (its more aggressive cousin) used to split
       short words like "how" into "ho" / "w" when MAX_COLS was a hair
       off vs the real container width. */
    overflow-wrap: break-word;
  }
  .line.intro-line { white-space: nowrap; }
  .line.attrib { font-size: 12px; letter-spacing: .04em; color: var(--ink-quiet); }
  /* passive markdown: line-level only, never inline. Literal markers
     (`> `, `- `/`* `, `# `…`###### `) stay in the buffer so saved .md is
     valid — the hide-marker rule below suppresses them in render. Wrap
     continuations carry a 2-space prefix so resize and reload preserve
     the styling. No bold/italic from `**`/`_` inside a line. */
  .line.md-quote {
    font-style: italic;
    color: var(--ink-soft);
    border-left: 2px solid var(--ink-faint);
    padding-left: .9em;
    margin-left: .8em;
  }
  .line.md-bullet, .line.md-bullet-cont {
    position: relative;
    padding-left: 1.2em;
  }
  .line.md-bullet::before {
    content: '•';
    position: absolute;
    left: 0;
    color: var(--ink-soft);
  }
  .line.md-heading, .line.md-heading-cont {
    font-weight: 700;
    letter-spacing: .05em;
    color: var(--ink);
  }
  /* hide the literal marker chars — kept in the buffer for saved markdown,
     suppressed in render so the line reads like a real blockquote / list /
     heading. data-md-marker is the number of leading char spans to hide. */
  .line[data-md-marker="2"] > .ch:nth-child(-n+2),
  .line[data-md-marker="3"] > .ch:nth-child(-n+3),
  .line[data-md-marker="4"] > .ch:nth-child(-n+4),
  .line[data-md-marker="5"] > .ch:nth-child(-n+5),
  .line[data-md-marker="6"] > .ch:nth-child(-n+6),
  .line[data-md-marker="7"] > .ch:nth-child(-n+7) { display: none; }
  .line.cr { animation: carriage .24s cubic-bezier(.2,.8,.3,1); }
  .line.welcome-fade { animation: welcomeFade .7s ease forwards; }
  @keyframes welcomeFade { to { opacity: 0; } }
  @keyframes carriage {
    0%   { transform: translateX(-11px); }
    65%  { transform: translateX(1.5px); }
    100% { transform: translateX(0); }
  }

  .ch { display: inline-block; }
  /* old-school overstrike — ↑ lifts the cursor onto a prior line and the char
     under it renders as a block; typing x covers it and advances right */
  .ch.overstrike { background: currentColor; color: var(--paper); border-radius: 1px; }
  .ch.overstrike.trailing { opacity: .35; }   /* faint block when the cursor sits past the last char */
  .stage.overstriking .caret { opacity: 0; }  /* hide the active line's caret while a prior line holds the cursor */
  /* editable page: the cursor on a prior line is a normal insertion bar, not a
     block — re-shown over the rule above that hides carets while overstriking */
  .stage.overstriking .caret.edit { opacity: .9; animation: blink 780ms steps(1, end) infinite; }
  .stage.typing .caret.edit { animation: none; opacity: .9; }

  /* blinking bar cursor — rests (solid) while typing */
  .caret {
    display: inline-block;
    width: 2px; height: 1.08em;
    margin-left: 2px;
    vertical-align: -0.16em;
    background: var(--ink);
    animation: blink 780ms steps(1, end) infinite;
  }
  @keyframes blink { 0%,49% { opacity: .9; } 50%,100% { opacity: 0; } }
  .stage.typing .caret { animation: none; opacity: .9; }

  /* ---------- intro ---------- */
  .intro {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    display: grid; grid-auto-flow: column; align-items: center;
    font-family: var(--mono);
    font-size: var(--type-size);
    color: var(--ink);
    transition: opacity .6s ease, transform .6s ease;
  }
  .intro.leaving { opacity: 0; transform: translate(-50%, -58%); }
  .period { color: var(--accent); }

  /* ---------- shortcuts ---------- */
  .hints {
    position: fixed;
    bottom: 30px; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center;
    gap: 26px;
    font-family: var(--mono);
    z-index: 10;
    transition: opacity .7s ease;
    user-select: none;
  }
  .hints.dim { opacity: 0; pointer-events: none; }
  .hint { display: inline-flex; align-items: baseline; gap: 9px; }
  .hint .k { font-weight: 700; font-size: 11px; letter-spacing: .22em; color: var(--ink-quiet); }
  .hint .l { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: var(--ink-faint); }
  .hint-btn { cursor: pointer; }
  .hint-btn:hover .k, .hint-btn:hover .l { color: var(--ink); }
  .sep { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-faint); opacity: .7; }

  /* ---------- save: date stamp ---------- */
  .stamp {
    position: absolute; left: 50%; top: 46%;
    transform: translate(-50%,-50%);
    text-align: center; opacity: 0; pointer-events: none; z-index: 8;
  }
  .stamp.show { animation: stampSeq 2.0s ease forwards; }
  @keyframes stampSeq {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(1.14); }
    13%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    68%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1); }
  }
  .stamp .date {
    font-family: var(--mono); font-weight: 700;
    font-size: 15px; letter-spacing: .34em; text-indent: .34em;
    color: var(--ink);
    text-shadow: 0 1px 0 var(--emboss), 0 -1px 1px rgba(0,0,0,.12);
  }
  .stamp .kept {
    margin-top: 15px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: .24em; text-transform: uppercase; color: var(--ink-faint);
  }

  /* ---------- burn ---------- */
  .ash {
    animation: burn-char 1900ms ease forwards;
    animation-delay: var(--delay, 0ms);
    transform-origin: 50% 60%;
    will-change: opacity, color, transform;   /* no per-char blur — that was the jank */
  }
  /* char & smolder: ink → ember → charred black → gone, fading in place.
     (Previously each char drifted up by a random Y, which made the whole
      block look squiggly. Stagger of timing per char still gives the
      uneven-burning feel without the jiggle.) */
  @keyframes burn-char {
    0%   { color: var(--ink); opacity: 1; text-shadow: none; }
    28%  { color: var(--ember); text-shadow: 0 0 7px rgba(176,95,74,.5); }
    60%  { color: #2a1a12; text-shadow: none; }
    100% { color: rgba(20,12,8,0); opacity: 0; }
  }
  /* spark after the burn — fixed fire-orange across every theme. Sparks
     are sparks: they're not the wordmark's themed accent, they're the
     thing the wordmark's orange dot was inspired by. Quiet, brief, just
     enough presence to read as a spark on any paper color.
     Motion uses offset-path (a per-spark bezier curve set inline in JS)
     so the element glides along a smooth curve with a single easing —
     no waypoint kinks, no per-segment velocity dips. */
  .ember {
    --spark: #ff6a1f;
    position: absolute; width: 2px; height: 2px; border-radius: 999px;
    background: var(--spark);
    box-shadow:
      0 0 1px var(--spark),
      0 0 5px color-mix(in srgb, var(--spark) 55%, transparent);
    opacity: 0; z-index: 6; pointer-events: none;
    offset-rotate: 0deg;                            /* don't rotate the dot to face the path */
    animation: ember 850ms cubic-bezier(.18, .6, .35, 1) forwards;
  }
  /* The element glides along its inline offset-path. offset-distance
     drives position; opacity and scale layer on top for fade and flicker.
     Single-segment interpolation per property = continuous velocity. */
  @keyframes ember {
    0%   { offset-distance: 0%;   opacity: 0;   transform: scale(.55); }
    16%  {                        opacity: 1;   transform: scale(1); }
    65%  {                        opacity: .55; transform: scale(.92); }
    100% { offset-distance: 100%; opacity: 0;   transform: scale(.35); }
  }
  .smoke {
    position: absolute; width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle, rgba(120,120,128,.16), rgba(120,120,128,0) 68%);
    filter: blur(15px); opacity: 0; pointer-events: none; z-index: 5;
  }
  .smoke.go { animation: smokeRise 1.9s ease-out forwards; }
  @keyframes smokeRise {
    0%   { opacity: 0; transform: translateY(12px) scale(.55); }
    28%  { opacity: .85; }
    100% { opacity: 0; transform: translateY(-130px) scale(1.6); }
  }

  /* ---------- smolder (burn-if-you-stop) ---------- */
  /* a warm vignette creeps in from the edges while you sit idle; it flickers,
     and if you don't type it tips over into a full burn. typing cools it away. */
  .smolder-veil {
    position: absolute; inset: 0; z-index: 4;
    pointer-events: none; opacity: 0;
    background: radial-gradient(circle at 50% 48%,
      rgba(0,0,0,0) 28%, rgba(176,95,74,.28) 70%, rgba(70,28,18,.6) 100%);
  }
  /* the warm char creeps in steadily over the whole smolder, so you can see it coming */
  .stage.smoldering .smolder-veil { animation: smolderGrow var(--smolder-dur, 6500ms) ease-in forwards; }
  @keyframes smolderGrow { from { opacity: 0; } to { opacity: 1; } }

  /* ---------- feedback mode ---------- */
  /* subtle paper tint so the room feels different from normal writing */
  body.feedback { background-color: color-mix(in srgb, var(--paper) 94%, var(--accent) 6%); }
  body.dark.feedback { background-color: color-mix(in srgb, var(--paper) 92%, var(--accent) 8%); }
  body.amber.feedback { background-color: color-mix(in srgb, var(--paper) 92%, var(--accent) 8%); }
  body.dispatch.feedback { background-color: color-mix(in srgb, var(--paper) 92%, var(--ember) 8%); }

  /* persistent corner label so there's no mistaking what mode you're in */
  .feedback-label {
    position: fixed; left: 22px; top: 18px; z-index: 9;
    font-family: var(--mono); font-size: 11px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--ink-quiet);
    pointer-events: none; user-select: none; display: none;
  }
  body.feedback .feedback-label { display: block; }
  /* ephemeral "page paused" toast — only shown if the user had writing when
     they entered feedback mode. fades after a few seconds. */
  .feedback-paused {
    position: fixed; right: 22px; top: 18px; z-index: 10;
    font-family: var(--mono); font-size: 11px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--ink-quiet);
    opacity: 0; pointer-events: none;
    transition: opacity .35s ease;
  }
  .feedback-paused.show { opacity: 1; }

  /* quiet auto-update status — top-center, in the same caps-mono whisper as the
     hints. Hidden until there's something to report; a thin accent bar fills as
     the new version downloads, then it turns into a one-tap "restart". No modal,
     no interruption — it still installs on its own on the next quit if ignored. */
  .update {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 11; -webkit-app-region: no-drag;
    display: none; flex-direction: column; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--ink-quiet); user-select: none;
    opacity: 0; transition: opacity .4s ease;
  }
  .update.show { display: flex; opacity: 1; }
  .update-bar { width: 170px; height: 2px; border-radius: 2px; background: var(--rule); overflow: hidden; }
  .update-bar.hide { display: none; }
  .update-bar > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .25s ease; }
  .update-action {
    appearance: none; background: none; border: 0; padding: 2px 4px;
    font: inherit; letter-spacing: inherit; text-transform: inherit;
    color: var(--accent); cursor: pointer; -webkit-app-region: no-drag;
  }
  .update-action:hover { text-decoration: underline; }

  /* small grey × to the right of a seeded quote — click to remove it */
  .quote-x {
    position: fixed; z-index: 9; display: none;
    width: 18px; height: 18px; line-height: 17px; text-align: center;
    font-family: var(--mono); font-size: 15px; color: var(--ink-faint);
    cursor: pointer; opacity: .55; user-select: none;
    transition: color .15s ease, opacity .15s ease;
  }
  .quote-x:hover { color: var(--ink-quiet); opacity: 1; }

  /* small mac share glyph above the × — invisible until the quote is hovered.
     reveals on quote/button hover, fades out 80ms after leaving.
     visual weight matches the × exactly: --ink-faint at .55 opacity at rest,
     --ink-quiet at full opacity on direct hover. */
  .quote-share {
    position: fixed; z-index: 9; display: none;
    width: 18px; height: 18px; text-align: center;
    cursor: pointer; opacity: 0; user-select: none;
    color: var(--ink-faint);
    transition: opacity .2s ease, color .15s ease;
  }
  .quote-share.is-revealed { opacity: .55; }
  .quote-share.is-revealed:hover { opacity: 1; color: var(--ink-quiet); }
  .quote-share svg { display: block; margin: 0 auto; }

  .smolder-warn {
    position: fixed; left: 0; right: 0; top: 40px; z-index: 7;
    text-align: center; pointer-events: none; user-select: none;
    font-family: var(--mono); font-size: 12px; letter-spacing: .24em; text-transform: uppercase;
    color: var(--ember); opacity: 0;
  }
  .stage.smoldering .smolder-warn { animation: warnPulse 1.05s ease-in-out infinite; }
  @keyframes warnPulse { 0%,100% { opacity: .3; } 50% { opacity: .95; } }

  /* ---------- settings panel ---------- */
  .settings {
    position: fixed; right: 22px; top: 50%; transform: translateY(-50%); z-index: 12;
    width: 256px; max-height: calc(100vh - 36px); overflow-y: auto;
    padding: 14px 16px 12px;
    background: var(--panel); border: 1px solid var(--rule); border-radius: 14px;
    box-shadow: 0 18px 44px -18px var(--panel-shadow);
    font-family: var(--mono);
    animation: settingsIn .22s cubic-bezier(.22,.61,.25,1);   /* slides in from the right each time it opens */
  }
  @keyframes settingsIn {
    from { opacity: 0; transform: translateY(-50%) translateX(14px); }
    to   { opacity: 1; transform: translateY(-50%) translateX(0); }
  }
  .settings[hidden] { display: none; }
  .settings-title {
    font-size: 10px; letter-spacing: .24em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 10px;
  }
  .setrow {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; font-size: 12.5px; color: var(--ink-soft);
    cursor: pointer; user-select: none;
  }
  .setrow input { position: absolute; opacity: 0; pointer-events: none; }
  .setrow .sw {
    position: relative; width: 34px; height: 18px; border-radius: 999px;
    background: var(--sw-off); transition: background .2s ease; flex: none;
  }
  .setrow .sw::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%; background: #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,.25); transition: transform .2s ease;
  }
  .setrow input:checked ~ .sw { background: var(--accent); }
  .setrow input:checked ~ .sw::after { transform: translateX(16px); }
  .setdiv { height: 1px; background: var(--rule); margin: 6px 0; }
  /* a row that can't change right now (editable mode mid-page) — dimmed, still hoverable for the info tip */
  .setrow.setrow-locked { opacity: .45; }
  .setrow-btn { cursor: pointer; gap: 12px; }
  .setrow-btn[hidden] { display: none; }
  /* Sound sub-rows — only shown when Sound itself is on. Indent + slightly
     quieter label so they read as children of the Sound row above. */
  .sound-details[hidden] { display: none; }
  .setrow-sub { padding-left: 16px; }
  .setrow-sub > span:first-child { color: var(--ink-quiet); }
  .setval {
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 12px; color: var(--ink-soft, #2c2d32);
  }
  .setpick {
    flex: none; font-size: 10px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--accent);
  }
  /* Segmented picker — used in a full-width setrow for mutually-exclusive
     choices like the theme. Reads like a list of options ("light · dark ·
     amber · dispatch") with the active one in accent. Replaces 3 toggle rows. */
  .setrow-seg { padding: 4px 0; justify-content: center; }
  .seg {
    display: inline-flex; align-items: center; justify-content: center;
    flex-wrap: nowrap; gap: 0;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em;
    text-transform: uppercase;
  }
  .seg-opt {
    appearance: none; background: none; border: 0; padding: 4px 5px;
    font: inherit; letter-spacing: inherit; text-transform: inherit;
    color: var(--ink-quiet); cursor: pointer; border-radius: 4px;
    transition: color .15s ease;
  }
  .seg-opt:hover { color: var(--ink-soft); }
  .seg-opt[aria-pressed="true"] { color: var(--accent); }
  .seg-opt + .seg-opt::before {
    content: "·"; color: var(--ink-faint); margin: 0 2px 0 -3px; pointer-events: none;
  }
  .burnsecs { margin-left: auto; margin-right: 14px; cursor: pointer; }
  /* Unobtrusive footer at the bottom of the settings panel — version + the
     two quiet links (feedback, why?). All in the same caps-mono treatment as
     before; the links pick up the accent on hover. */
  .setversion {
    margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--rule);
    text-align: center; font-family: var(--mono);
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--ink-quiet); user-select: none;
  }
  .setversion:empty { display: none; }
  .setversion .setfoot-link {
    appearance: none; background: none; border: 0; padding: 2px 4px;
    font: inherit; letter-spacing: inherit; text-transform: inherit;
    color: var(--ink-quiet); cursor: pointer;
    transition: color .15s ease;
  }
  .setversion .setfoot-link:hover { color: var(--accent); }
  .setversion .setfoot-sep { color: var(--ink-faint); margin: 0 4px; }

  /* live session stats inside the settings panel — visible whenever you
     open settings, so you can check the word count + writing time without
     having the on-screen overlay on. updates every second. */
  .setstats {
    display: flex; gap: 14px; justify-content: center; margin-bottom: 12px;
    padding: 8px 0;
    font-family: var(--mono); font-size: 11px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--ink-quiet); user-select: none;
  }
  .setstats span:empty { display: none; }
  .setstats:has(> *:empty:nth-child(1)):has(> *:empty:nth-child(2)):has(> *:empty:nth-child(3)) { display: none; }
  .info {
    position: relative;
    display: inline-flex; align-items: center; justify-content: center;
    width: 13px; height: 13px; margin-left: 5px; vertical-align: middle;
    border: 1px solid var(--ink-faint); border-radius: 50%;
    font-size: 9px; font-weight: 700; font-style: italic; line-height: 1;
    color: var(--ink-quiet); cursor: help; text-transform: none; letter-spacing: 0;
  }
  /* The inline .tip spans next to each info mark hold the source text but are
     never shown — a single shared callout (#floatTip, appended at body level)
     renders them on hover. We can't render the tip in place because .settings
     uses transform: translateY(-50%) for centering, which makes it the
     containing block for any position:fixed descendant (CSS spec quirk), and
     overflow-y:auto would clip an absolutely-positioned tip horizontally too. */
  .info .tip { display: none; }
  .float-tip {
    position: fixed; right: 290px; top: 0;
    transform: translateY(-50%) translateX(4px);
    width: 220px; padding: 10px 12px;
    /* frosted glass: same panel color but translucent, with blur behind so the
       writing softens into the callout instead of fighting it */
    background: color-mix(in srgb, var(--panel) 78%, transparent);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    backdrop-filter: blur(14px) saturate(140%);
    color: var(--ink-soft);
    border: 1px solid var(--rule); border-radius: 10px;
    box-shadow: 0 14px 30px -14px var(--panel-shadow);
    font-family: var(--mono);
    font-size: 11.5px; font-weight: 400; font-style: normal; line-height: 1.55;
    letter-spacing: normal; text-transform: none; text-align: left; white-space: normal;
    opacity: 0; pointer-events: none;
    transition: opacity .16s ease, transform .16s ease;
    z-index: 30;
  }
  .float-tip::after {                /* caret on the right edge, pointing at the info mark */
    content: ""; position: absolute; left: 100%; top: 50%; transform: translateY(-50%);
    border: 6px solid transparent;
    border-left-color: color-mix(in srgb, var(--panel) 78%, transparent);
  }
  .float-tip.show { opacity: 1; transform: translateY(-50%) translateX(0); }

  /* ---------- iOS (touch) ---------- */
  /* the iPhone app adds body.ios and keeps --vvh / --vvt synced to the
     visual viewport, so the strike point centers in the area the keyboard
     leaves visible — the page never hides under the keys */
  body.ios { overscroll-behavior: none; -webkit-text-size-adjust: 100%; }
  body.ios .stage { top: var(--vvt, 0px); height: var(--vvh, 100%); }
  body.ios .hint .k { display: none; }              /* no ⌘ glyphs on glass */
  body.ios .hint .l { font-size: 12.5px; letter-spacing: .26em; }
  /* keep and burn at opposite edges of the bottom — distance, not chrome.
     The separator dot goes; it made the two read as one object. Each word
     carries a fat invisible tap target, and burn wears a quiet ember tint
     so the destructive one identifies itself. */
  body.ios .hints {
    bottom: auto; left: 0; right: 0;
    padding: 0 13vw;
    top: calc(var(--vvt, 0px) + var(--vvh, 100vh) - 50px - env(safe-area-inset-bottom, 0px) * 0.5);
  }
  body.ios .hints-group {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%;
  }
  body.ios .hints-group[hidden] { display: none; }
  body.ios .hints .sep { display: none; }
  body.ios .hint { padding: 14px 18px; margin: -14px -18px; }
  body.ios #hintBurn .l { color: color-mix(in srgb, var(--ember) 60%, var(--ink-faint)); }
  body.ios .settings {
    top: calc(var(--vvt, 0px) + var(--vvh, 100vh) / 2);
    right: 16px;
    max-height: calc(var(--vvh, 100vh) - 24px);
  }
  /* settings lives at the top corner on the phone — a quiet gear glyph,
     keep & burn alone at the bottom. 40px box = a real thumb target. */
  body.ios .hint.ios-settings {
    position: fixed; z-index: 11;
    top: calc(8px + env(safe-area-inset-top, 0px));
    right: 12px;
    width: 40px; height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink-faint);
    -webkit-tap-highlight-color: transparent;
  }
  body.ios .hint.ios-settings:active { color: var(--ink-quiet); }
  body.ios .feedback-label, body.ios .feedback-paused { top: calc(14px + env(safe-area-inset-top, 0px)); }
  body.ios .smolder-warn { top: calc(36px + env(safe-area-inset-top, 0px)); }
  body.ios .update { top: calc(12px + env(safe-area-inset-top, 0px)); }
  /* The keyboard's field IS the paper: an invisible input covering the whole
     writing surface, so a finger lands on a real focusable element and iOS
     presents the keyboard natively — programmatic focus() sets focus but
     refuses to raise the keys. Controls layer above it (hints z10, update
     z11, settings z12, quote-x z9); taps forward through to the page. */
  #mobileInput {
    position: fixed; inset: 0; width: 100%; height: 100%;
    border: 0; padding: 0; margin: 0; border-radius: 0;
    opacity: 0.01; background: transparent; color: transparent;
    caret-color: transparent; outline: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    z-index: 5;
    font-size: 16px;                                /* ≥16px stops the focus zoom */
  }
</style>
</head>
<body>
  <div class="window-drag" aria-hidden="true"></div>

    <div class="feedback-label" id="feedbackLabel" aria-hidden="true">feedback</div>
    <div class="feedback-paused" id="feedbackPaused" aria-hidden="true">page paused. back when you're done.</div>
    <div class="quote-share" id="quoteShare" title="share as wallpaper" aria-hidden="true"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 10V2"/><path d="M5 5L8 2L11 5"/><path d="M3.5 8V13C3.5 13.5523 3.94772 14 4.5 14H11.5C12.0523 14 12.5 13.5523 12.5 13V8"/></svg></div>

  </div>

  <div class="hints dim" id="hints">
    <span class="hints-group" id="hintsNormal">

      <span class="hint hint-btn" id="hintBurn"><span class="k">&#8984;B</span><span class="l">burn</span></span>

    </span>

    <div class="setrow setrow-seg">
      <span class="seg" id="themePick" role="radiogroup" aria-label="Theme">
        <button type="button" class="seg-opt" data-theme="">light</button>
        <button type="button" class="seg-opt" data-theme="dark">dark</button>
        <button type="button" class="seg-opt" data-theme="amber">amber</button>

    <label class="setrow setrow-onTop" id="rowOnTop" hidden><span>Stay on top <span class="info" tabindex="0">i<span class="tip">Keeps the type window above all others. Good for jotting while reading something else.</span></span></span><input type="checkbox" id="setOnTop" /><span class="sw"></span></label>
    <label class="setrow" id="rowEditable"><span>Editable page <span class="info" tabindex="0">i<span class="tip">Unlocks the page — the arrow keys move the cursor back through what you've written, and you can edit it. Set it before you start: it locks in once you've typed.</span></span></span><input type="checkbox" id="setEditable" /><span class="sw"></span></label>

    <label class="setrow"><span>Pages</span><input type="checkbox" id="setPages" /><span class="sw"></span></label>
    <label class="setrow"><span>Timer</span><input type="checkbox" id="setTimer" /><span class="sw"></span></label>
    <div class="setdiv"></div>
    <label class="setrow"><span>Sound</span><input type="checkbox" id="setSound" /><span class="sw"></span></label>
    <div class="sound-details" id="soundDetails" hidden>
      <label class="setrow setrow-sub"><span>Keystroke click</span><input type="checkbox" id="setClicks" /><span class="sw"></span></label>
      <label class="setrow setrow-sub"><span>Carriage return</span><input type="checkbox" id="setCarriage" /><span class="sw"></span></label>
      <label class="setrow setrow-sub"><span>Margin bell</span><input type="checkbox" id="setBell" /><span class="sw"></span></label>

    <label class="setrow"><span>On burn</span><input type="checkbox" id="setQuoteBurn" /><span class="sw"></span></label>

    <div class="settings-title" id="saveTitle" hidden>save as .md to <span class="info" tabindex="0">i<span class="tip">Point this at your Obsidian vault, or any notes folder. Kept pages land straight in your notes. Plain markdown, no import step.</span></span></div>
    <div class="setrow setrow-btn" id="rowSaveFolder" hidden>
      <span class="setval" id="saveFolderLabel">Downloads</span>
      <span class="setpick">choose…</span>

  <div class="float-tip" id="floatTip" role="tooltip" aria-hidden="true"></div>

<script src="quotes.js"></script>
<script>
(() => {
  const feed    = document.getElementById('feed');
  const stage   = document.getElementById('stage');
  const introEl = document.getElementById('intro');
  const hints   = document.getElementById('hints');
  const stampEl = document.getElementById('stamp');
  const stampDate = document.getElementById('stampDate');
  const stampKept = document.getElementById('stampKept');
  const hintSettings = document.getElementById('hintSettings');
  const settingsEl = document.getElementById('settings');
  const quoteX = document.getElementById('quoteX');
  const quoteShare = document.getElementById('quoteShare');
  // Footer line at the bottom of settings: "v1.3.7 · feedback · why?". The
  // version comes from main via preload (only set in the Electron build);
  // in a plain browser dev preview that slot is omitted instead of falling
  // back to placeholder text. feedback opens the in-app writing surface,
  // why? opens the type site externally.
  const setVersionEl = document.getElementById('setVersion');
  if (setVersionEl) {
    const ver = window.typeAPI && window.typeAPI.version;
    const parts = [];
    if (ver) {
      const v = document.createElement('span');
      v.textContent = 'v' + ver;
      parts.push(v);
    }
    const fbBtn = document.createElement('button'); fbBtn.type = 'button';
    fbBtn.className = 'setfoot-link'; fbBtn.id = 'footFeedback'; fbBtn.textContent = 'feedback';
    parts.push(fbBtn);
    const whyBtn = document.createElement('button'); whyBtn.type = 'button';
    whyBtn.className = 'setfoot-link'; whyBtn.id = 'footWhy'; whyBtn.textContent = 'why?';
    parts.push(whyBtn);
    parts.forEach((p, i) => {
      if (i > 0) {
        const sep = document.createElement('span');
        sep.className = 'setfoot-sep'; sep.textContent = '·';
        setVersionEl.append(sep);
      }
      setVersionEl.append(p);
    });
    setVersionEl.removeAttribute('aria-hidden');
    whyBtn.addEventListener('click', () => { window.open('https://kellyvohs.com/type#why', '_blank', 'noopener'); });
    // feedback wiring is bound later, once enterFeedbackMode is defined
  }

  // --- auto-update status (desktop only) ---
  // A quiet, progress-aware replacement for the old stack of native modal
  // dialogs. The new version downloads in the background; this shows how far
  // along it is, then offers a one-tap restart. Ignoring it is fine — the
  // update still installs on its own the next time you quit.
  (function setupUpdate() {
    const el = document.getElementById('update');
    if (!el || !window.typeAPI || typeof window.typeAPI.onUpdate !== 'function') return;
    const bar = el.querySelector('.update-bar');
    const fill = el.querySelector('.update-bar > i');
    const text = el.querySelector('.update-text');
    let hideTimer = null;
    const show = () => { clearTimeout(hideTimer); el.classList.add('show'); };
    const hideAfter = (ms) => { clearTimeout(hideTimer); hideTimer = setTimeout(() => el.classList.remove('show'), ms); };
    const setBar = (pct) => { bar.classList.remove('hide'); fill.style.width = Math.max(0, Math.min(100, Math.round(pct))) + '%'; };
    const noBar = () => bar.classList.add('hide');

    window.typeAPI.onUpdate((u) => {
      u = u || {};
      switch (u.state) {
        case 'checking':
          noBar(); text.textContent = 'checking for updates…'; show(); break;
        case 'available':
          setBar(0); text.textContent = 'downloading update…'; show(); break;
        case 'progress':
          setBar(u.percent || 0);
          text.textContent = 'downloading update · ' + Math.round(u.percent || 0) + '%';
          show(); break;
        case 'ready': {
          noBar(); text.textContent = '';
          text.append(document.createTextNode((u.version ? 'type v' + u.version : 'update') + ' ready · '));
          const btn = document.createElement('button');
          btn.type = 'button'; btn.className = 'update-action'; btn.textContent = 'restart';
          btn.addEventListener('click', () => { if (window.typeAPI.quitAndInstall) window.typeAPI.quitAndInstall(); });
          text.append(btn);
          show(); break;                          // persistent until restart or quit
        }
        case 'none':
          noBar(); text.textContent = 'you’re up to date'; show(); hideAfter(2600); break;
        case 'error':
          noBar(); text.textContent = 'update check failed'; show(); hideAfter(3200); break;
      }
    });
  })();

  /* ================= SETTINGS ================= */
  const DEFAULTS = { dark: false, amber: false, dispatch: false, zen: false, onTop: false, editable: false, smolder: true, smolderSecs: 10, wordCount: false, pages: false, timer: false, sound: true, clicks: false, carriage: false, bell: false, quoteOpen: true, quoteBurn: true, saveDir: '' };
  let settings = Object.assign({}, DEFAULTS);
  try { Object.assign(settings, JSON.parse(localStorage.getItem('type.settings') || '{}')); } catch (e) {}
  const saveSettings = () => { try { localStorage.setItem('type.settings', JSON.stringify(settings)); } catch (e) {} };
  const THEMES = ['dark', 'amber', 'dispatch'];
  const applyTheme = () => {
    THEMES.forEach(t => document.body.classList.toggle(t, !!settings[t]));
  };
  const boxes = { zen: document.getElementById('setZen'), onTop: document.getElementById('setOnTop'), editable: document.getElementById('setEditable'), smolder: document.getElementById('setSmolder'), wordCount: document.getElementById('setWordCount'), pages: document.getElementById('setPages'), timer: document.getElementById('setTimer'), sound: document.getElementById('setSound'), clicks: document.getElementById('setClicks'), carriage: document.getElementById('setCarriage'), bell: document.getElementById('setBell'), quoteOpen: document.getElementById('setQuoteOpen'), quoteBurn: document.getElementById('setQuoteBurn') };
  Object.keys(boxes).forEach(k => {
    boxes[k].checked = !!settings[k];
    boxes[k].addEventListener('change', () => {
      // editable mode is a decision you make before you write — once there's
      // ink on the page, the switch stays where it was until the next sheet
      if (k === 'editable' && sheetStarted()) { boxes[k].checked = !!settings.editable; return; }
      settings[k] = boxes[k].checked;
      saveSettings();
      if (k === 'zen')   applyZen();
      if (k === 'onTop') applyOnTop();
      if (k === 'smolder') { if (settings.smolder) scheduleSmolder(); else coolSmolder(); updateBurnAfter(); }
      if (k === 'wordCount' || k === 'pages' || k === 'timer') updateMeter();
      if (k === 'sound') applySoundDetails();
    });
  });
  // Theme picker — mutually exclusive across THEMES booleans + "light" (none on)
  const themePick = document.getElementById('themePick');
  const syncThemePick = () => {
    const active = THEMES.find(t => settings[t]) || '';
    themePick.querySelectorAll('.seg-opt').forEach(b => {
      b.setAttribute('aria-pressed', String(b.dataset.theme === active));
    });
  };
  themePick.addEventListener('click', (e) => {
    const btn = e.target.closest('.seg-opt');
    if (!btn) return;
    const pick = btn.dataset.theme;
    THEMES.forEach(t => { settings[t] = (t === pick); });
    saveSettings();
    applyTheme();
    syncThemePick();
  });
  syncThemePick();
  applyTheme();
  // Sound has 3 sub-toggles (clicks / carriage / bell) that only matter when
  // sound is on — keep them tucked away otherwise to keep the panel short.
  const soundDetails = document.getElementById('soundDetails');
  const applySoundDetails = () => { soundDetails.hidden = !settings.sound; };
  applySoundDetails();
  const toggleSettings = () => { settingsEl.hidden = !settingsEl.hidden; if (!settingsEl.hidden) hints.classList.remove('dim'); };
  hintSettings.addEventListener('click', toggleSettings);
  document.addEventListener('mousedown', (e) => {
    if (!settingsEl.hidden && !settingsEl.contains(e.target) && !hintSettings.contains(e.target)) settingsEl.hidden = true;
  });

  // Each info mark has an inline .tip span carrying its text. Render that text
  // through a single shared callout (#floatTip) appended at body level — the
  // settings panel's transform centering + overflow:auto would otherwise trap
  // and clip the tooltip.
  const floatTip = document.getElementById('floatTip');
  settingsEl.querySelectorAll('.info').forEach(infoEl => {
    const src = infoEl.querySelector('.tip');
    if (!src || !floatTip) return;
    const show = () => {
      const r = infoEl.getBoundingClientRect();
      floatTip.textContent = src.textContent;     // read live — iOS rewrites the save tip
      floatTip.style.top = (r.top + r.height / 2) + 'px';
      floatTip.classList.add('show');
    };
    const hide = () => floatTip.classList.remove('show');
    infoEl.addEventListener('mouseenter', show);
    infoEl.addEventListener('mouseleave', hide);
    infoEl.addEventListener('focus', show);
    infoEl.addEventListener('blur', hide);
  });

  // save-folder picker — only available in the desktop app
  const desktop = !!(window.typeAPI && window.typeAPI.isDesktop);
  const rowSaveFolder = document.getElementById('rowSaveFolder');
  const saveFolderLabel = document.getElementById('saveFolderLabel');
  function folderName(p) { return p ? p.split('/').filter(Boolean).pop() : 'Downloads'; }
  if (desktop) {
    document.getElementById('saveDiv').hidden = false;
    document.getElementById('saveTitle').hidden = false;
    rowSaveFolder.hidden = false;
    saveFolderLabel.textContent = folderName(settings.saveDir);
    rowSaveFolder.addEventListener('click', async () => {
      const dir = await window.typeAPI.pickFolder();
      if (dir) { settings.saveDir = dir; saveSettings(); saveFolderLabel.textContent = folderName(dir); }
    });
    document.getElementById('rowOnTop').hidden = false;   // window-level toggle, desktop only
  }

  /* ================= ZEN / STAY-ON-TOP ================= */
  // Zen = fullscreen, edge-to-edge, just you and the page.
  function applyZen() {
    if (desktop && window.typeAPI.setZen) { window.typeAPI.setZen(!!settings.zen); return; }
    // browser: the Fullscreen API needs a user gesture, which the settings click provides
    try {
      if (settings.zen && !document.fullscreenElement) document.documentElement.requestFullscreen();
      else if (!settings.zen && document.fullscreenElement) document.exitFullscreen();
    } catch (e) {}
  }
  function applyOnTop() {
    if (desktop && window.typeAPI.setOnTop) window.typeAPI.setOnTop(!!settings.onTop);
  }
  // keep the Zen toggle honest if the user leaves fullscreen with Esc (browser)
  document.addEventListener('fullscreenchange', () => {
    const fs = !!document.fullscreenElement;
    if (!desktop && settings.zen !== fs) { settings.zen = fs; boxes.zen.checked = fs; saveSettings(); }
  });
  // desktop: main process tells us when the window enters/leaves native fullscreen
  // (covers ⌃⌘F system shortcut, green-button menu, our own setZen call, etc.)
  if (desktop && window.typeAPI.onFullscreenChanged) {
    window.typeAPI.onFullscreenChanged((fs) => {
      if (settings.zen !== fs) {
        settings.zen = fs;
        boxes.zen.checked = fs;
        saveSettings();
      }
    });
  }
  applyOnTop();
  if (settings.zen) applyZen();

  // how long the page waits before burning when you stop (only relevant with "Burn if I stop")
  const burnAfterVal = document.getElementById('burnAfterVal');
  function updateBurnAfter() {
    burnAfterVal.hidden = !settings.smolder;
    burnAfterVal.textContent = (settings.smolderSecs || 10) + 's';
  }
  burnAfterVal.addEventListener('click', (e) => {
    e.preventDefault(); e.stopPropagation();   // cycle the time without flipping the switch
    const opts = [10, 30, 60, 120];
    settings.smolderSecs = opts[(opts.indexOf(settings.smolderSecs || 10) + 1) % opts.length];
    saveSettings(); updateBurnAfter(); resetSmolder();
  });
  updateBurnAfter();

  // line width adapts to the window — no fixed character count, no minimum screen size
  let MAX_COLS = 62;
  let BELL_AT  = 56;
  const LINE_H_PX = () => parseFloat(getComputedStyle(feed).lineHeight);
  function computeCols() {
    const w = feed.parentElement.getBoundingClientRect().width;

  let activeEl = null;
  let phase = 'intro';
  let frozen = false;
  let idleTimer = null;
  let typeRestTimer = null;
  let introTimers = [];
  let bellRung = false;
  let accentPeriod = false;        // colors a line's trailing period (the "type." burnt-orange dot)
  let quoteHold = null;            // when a quote is seeded, holds it in place until you've written under it
  let sheetStart = null;           // when the current sheet's writing began (for the timer)
  let userFloor = 0;               // index in locked where your own writing starts (seeded quote excluded from word count)
  let quoteShown = false;          // a seeded quote is currently on the page (removable via the ×)
  let activeQuote = null;          // the quote object currently on the page — used by the share button
  const QUOTE_HOLD_ROWS = 3;       // lines you can type beneath a quote before it starts rolling up

  // "started" = your own ink is on the sheet (a still-typing seeded quote or

  const rowEditable = document.getElementById('rowEditable');

  /* ================= SOUND ================= */
  let actx = null;

    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    return actx;
  };

    const ctx = AC();
    const buf = ctx.createBuffer(1, Math.max(1, ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  }
  function burst(dur, shape) {
    const ctx = AC();
    const buf = ctx.createBuffer(1, Math.max(1, ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, shape);
    const src = ctx.createBufferSource(); src.buffer = buf;
    return src;
  }
  function thock() {
    if (!settings.sound) return;
    if (!settings.clicks) return;
    const ctx = AC(), t = ctx.currentTime;
    // a dry, soft key click — broadband noise, no pitch, no resonance, no drummy body.
    // (tuned/resonant content is what turns into machine-gun or bongo when typing fast)
    const v = 0.15 + Math.random() * 0.05;            // clearly audible, slight per-press variation
    const nd = 0.02 + Math.random() * 0.006;
    const src = burst(nd, 2.8);
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1500 + Math.random() * 1300; bp.Q.value = 0.6;
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 500;  // strip drummy body, keep presence
    const g = ctx.createGain(); g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(0.0001, t + nd);
    src.connect(bp); bp.connect(hp); hp.connect(g); g.connect(ctx.destination);
    src.start(t); src.stop(t + nd);
  }
  function bell(vol) {
    if (!settings.sound) return;
    const ctx = AC(), t = ctx.currentTime; vol = vol || 0.11;
    [1046, 1568, 2349].forEach((f, i) => {
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = ctx.createGain(); const v = vol * (i === 0 ? 1 : 0.45 / i);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(v, t + 0.006);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
      o.connect(g).connect(ctx.destination); o.start(t); o.stop(t + 0.55);
    });
  }
  function zip(vol, dur) {
    if (!settings.sound) return;
    const ctx = AC(), t = ctx.currentTime; dur = dur || 0.14; vol = vol || 0.11;
    const src = ctx.createBufferSource(); src.buffer = noise(dur);
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.1;
    bp.frequency.setValueAtTime(2600, t); bp.frequency.exponentialRampToValueAtTime(700, t + dur);
    const g = ctx.createGain(); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(bp).connect(g).connect(ctx.destination); src.start(t); src.stop(t + dur);
  }
  function carriageReturn() {
    if (!settings.sound || !settings.carriage) return;
    const ctx = AC(), t = ctx.currentTime;
    // 1) the travel — a soft airy swish (broadband lowpass noise, no resonant whistle)
    const sd = 0.12;
    const src = burst(sd, 0.5);
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(3400, t); lp.frequency.exponentialRampToValueAtTime(820, t + sd);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.045, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + sd);
    src.connect(lp).connect(g).connect(ctx.destination); src.start(t); src.stop(t + sd);
    // 2) the seat — a woody chunk as the carriage hits the margin stop
    const tt = t + 0.10;
    const nb = burst(0.05, 2);
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 250; bp.Q.value = 1.3;
    const ng = ctx.createGain(); ng.gain.setValueAtTime(0.13, tt); ng.gain.exponentialRampToValueAtTime(0.0001, tt + 0.05);
    nb.connect(bp).connect(ng).connect(ctx.destination); nb.start(tt); nb.stop(tt + 0.05);
    const o = ctx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(150, tt); o.frequency.exponentialRampToValueAtTime(64, tt + 0.06);
    const og = ctx.createGain(); og.gain.setValueAtTime(0.10, tt); og.gain.exponentialRampToValueAtTime(0.0001, tt + 0.07);
    o.connect(og).connect(ctx.destination); o.start(tt); o.stop(tt + 0.08);
  }
  function whoosh() {
    if (!settings.sound) return;
    const ctx = AC(), t = ctx.currentTime, dur = 0.55;
    const src = ctx.createBufferSource(); src.buffer = noise(dur);
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(900, t); lp.frequency.exponentialRampToValueAtTime(220, t + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.09, t + 0.12);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(lp).connect(g).connect(ctx.destination); src.start(t); src.stop(t + dur);
  }
  function setSound(on) {
    settings.sound = on;
    boxes.sound.checked = on;
    saveSettings();
    if (on) { AC(); bell(0.07); }
  }

  // Safari/iOS won't make sound until the audio context is unlocked inside a real gesture
  let audioReady = false;
  function unlockAudio() {
    if (audioReady) return;
    audioReady = true;
    const ctx = AC();
    const b = ctx.createBuffer(1, 1, ctx.sampleRate);
    const s = ctx.createBufferSource(); s.buffer = b; s.connect(ctx.destination); s.start(0);
  }

  /* ================= RENDER ================= */
  function inkSpan(c) {
    const s = document.createElement('span');
    s.className = 'ch';
    s.textContent = c === ' ' ? ' ' : c;
    return s;
  }
  function caretEl() {
    const c = document.createElement('span');
    c.className = 'caret';
    return c;
  }
  // render text into an element; when accent is on, the final period is burnt orange (like "type.")
  function renderInto(el, text, accent) {
    el.textContent = '';

    for (let k = 0; k < n; k++) {
      if (accent && text[k] === '.' && k === n - 1) {
        const p = document.createElement('span'); p.className = 'ch period'; p.textContent = '.';
        el.appendChild(p);
      } else {
        el.appendChild(inkSpan(text[k]));
      }
    }
  }

  // rebuild a committed line's spans — used when the overstrike cursor lands on it,
  // leaves it, or x's a char on it
  function renderLockedLine(i) {
    const el = feed.children[i];
    if (!el) return;
    const text = locked[i] || '';
    const onLine = cursor && cursor.line === i;
    const editing = onLine && settings.editable;       // editable page: bar caret, not the block
    const editCaret = () => { const c = caretEl(); c.classList.add('edit'); return c; };
    el.textContent = '';
    for (let k = 0; k < text.length; k++) {
      if (editing && cursor.col === k) el.appendChild(editCaret());
      const s = document.createElement('span');
      s.className = 'ch' + (onLine && !settings.editable && cursor.col === k ? ' overstrike' : '');

  // cursor must never land on them — it would vanish and "type" invisibly over
  // the marker. data-md-marker is exactly the count the CSS hide-rule suppresses.
  function markerLen(i) {

  }

    if (locked.length === 0 || phase !== 'writing' || frozen || quotePlaying) return;

    stage.classList.add('overstriking');
    renderLockedLine(i);
    layout();
  }
  function exitOverstrike() {
    if (!cursor) return;

    layout();
  }
  function overstrikeAt(i, c) {
    const t = locked[i];

  function markTyping() {
    stage.classList.add('typing');

  /* ================= INTRO ================= */
  // Happens in the writing line, centered on the screen: types "type" + a burnt-

  let introPlayed = false;

  function runIntro() {
    introEl.style.display = 'none';
    activeEl = document.createElement('div');
    activeEl.className = 'line intro-line';

    activeEl.appendChild(caretEl());

    centerIntroLine();
    introTimers.push(setTimeout(playIntro, 500));   // ~0.5s of blink before it types
  }

  function playIntro() {
    if (introPlayed || phase !== 'intro') return;
    introPlayed = true;
    introTimers.forEach(clearTimeout); introTimers = [];
    const caret = activeEl.querySelector('.caret');
    let t = 0;
    // type t-y-p-e (centered)

  }

  /* ================= QUOTE ================= */
  // The quote is typed into the page as real text (silently), then it rolls up
  // and stays — exactly like the lines you type. You just keep writing beneath it.
  let quotePlaying = false;
  let quoteSkip = null;
  // the app opens with this every launch (after the first-run welcome)
  const OPENER = { text: "Most of us have two lives: the life we live, and the unlived life within us. Between the two stands Resistance.", author: "Steven Pressfield", source: "The War of Art" };

  //   "> "       → md-quote        (italic, indented, left rule; "> " hidden)
  //   "- " / "* "→ md-bullet       (• glyph, hanging indent; marker hidden)
  //   "# "…"###"→ md-heading       (bold, tracked; "#…# " hidden)
  // Wrap continuations carry a 2-space prefix in the buffer and inherit the
  // styling of the previous line as md-bullet-cont or md-heading-cont, so
  // resize and reload preserve list/heading shape. Inline patterns like
  // **bold** are intentionally NOT parsed — that would require splitting
  // mid-word and turn the typewriter into a WYSIWYG editor.
  const MD_CLASSES = ['md-quote', 'md-bullet', 'md-bullet-cont', 'md-heading', 'md-heading-cont'];

    if (text.startsWith('> '))  return { cls: 'md-quote',   markerLen: 2 };
    if (/^[-*] /.test(text))    return { cls: 'md-bullet',  markerLen: 2 };

      }
      if (prevEl.classList.contains('md-bullet') || prevEl.classList.contains('md-bullet-cont')) {

      el.dataset.mdMarker = String(info.markerLen);
    } else {

  function wrapText(text, cols) {
    const out = [];
    let line = '';
    for (let word of text.split(/\s+/)) {
      while (word.length > cols) { if (line) { out.push(line); line = ''; } out.push(word.slice(0, cols)); word = word.slice(cols); }
      if (!line) line = word;
      else if ((line + ' ' + word).length <= cols) line += ' ' + word;
      else { out.push(line); line = word; }
    }
    if (line) out.push(line);
    return out;

  // Re-wrap committed text to the current MAX_COLS on resize, so the writing
  // column stays centered regardless of what width it was originally typed

  // and user-typed paragraphs (preserving blank-line paragraph breaks).
  let lastMaxCols = MAX_COLS;
  function reflowLocked() {

    if (lastMaxCols === MAX_COLS) return;

        attribCount = wrapped.length;

    }

    // --- 2. Reflow the user-typed portion, preserving paragraph breaks ---
    // Each md block (blockquote / bullet item / heading) is unwrapped,
    // rewrapped to its body width, then re-prefixed. Plain prose between
    // blocks reflows as a single paragraph.
    const user = locked.slice(userFloor);
