<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>type — native spike (locked)</title>
<style>
  /* type's real palette, lifted from index.html */
  :root {
    --paper: #ffffff;
    --ink: #121316;
    --ink-quiet: #7c7f86;
    --ink-faint: #c2c4c9;
    --accent: #df5a26;            /* burnt orange */
    --mono: "Courier Prime", "Courier New", ui-monospace, monospace;
    --type-size: 18px;
    --leading: 1.3;                            /* tight line box => Mail-sized caret */
    --row: calc(var(--type-size) * 2.05);      /* the airy double-spaced rhythm we want */
    --gap: calc(var(--row) - var(--type-size) * var(--leading));  /* spacing added between lines, not inside them */
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #141519;
      --ink: #e7e8ea;
      --ink-quiet: #888b92;
      --ink-faint: #3f424a;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; background: var(--paper); color: var(--ink);
    font-family: var(--mono); overflow: hidden;
    -webkit-text-size-adjust: 100%;
  }

  /* the platen window: the paper rolls inside it, the past fades up under a veil */
  #stage {
    position: fixed; inset: 0; overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, transparent 4%, #000 44%, #000 90%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 4%, #000 44%, #000 90%, transparent 100%);
  }
  #paper {
    position: absolute; left: 50%; top: 0;
    transform: translate(-50%, 0);
    width: min(64ch, 84vw);
    font-family: var(--mono); font-size: var(--type-size); line-height: var(--leading);
    color: var(--ink);
    transition: transform .16s cubic-bezier(.22,.61,.25,1);
  }

  /* the past: committed lines, locked. Plain static text — not editable, so the
     caret can't enter them. Still selectable for copy. THIS is the "no going
     back" lock, enforced by the OS for free. */
  #locked { white-space: pre-wrap; overflow-wrap: break-word; }
  /* the airy rhythm comes from the gap BETWEEN lines, so the caret on the live
     line stays Mail-sized instead of growing to a double-spaced line box */
  #locked .line { margin-bottom: var(--gap); }

  /* the present: the line you're writing. A REAL native field — iOS owns the
     text, caret, autocorrect, dictation, undo, selection. We never re-render it. */
  #active {
    white-space: pre-wrap; overflow-wrap: break-word; word-break: normal;
    outline: none; border: 0; background: none;
    min-height: calc(var(--type-size) * var(--leading));
    caret-color: var(--ink); color: var(--ink);
    -webkit-user-modify: read-write-plaintext-only;
  }

  /* footer: KEEP · BURN — calm and quiet, like type's hints */
  #foot {
    position: fixed; left: 0; right: 0;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    display: flex; justify-content: center; align-items: center; gap: 26px;
    z-index: 10; user-select: none;
  }
  #foot button {
    appearance: none; background: none; border: 0;
    font-family: var(--mono); font-size: 11px; letter-spacing: .22em;
    text-transform: uppercase; color: var(--ink-faint); padding: 12px 8px;
  }
  #foot .sep { width: 26px; height: 1px; background: var(--ink-faint); opacity: .6; }
  #foot #burn { color: var(--accent); opacity: .85; }
</style>
</head>
<body>
  <div id="stage">
    <div id="paper">
      <div id="locked"></div>
      <div id="active" contenteditable="true"
           autocorrect="on" autocapitalize="sentences" spellcheck="false"
           enterkeyhint="next" aria-label="writing"></div>
    </div>
  </div>
  <div id="foot">
    <button id="keep">Keep</button>
    <span class="sep"></span>
    <button id="burn">Burn</button>
  </div>

<script>
  const paper  = document.getElementById('paper');
  const locked = document.getElementById('locked');
  const active = document.getElementById('active');

  /* ---------- type's REAL sound engine (lifted verbatim from index.html) ----------
     same WebAudio thock / carriage / bell / zip so the spike sounds identical to
     the app. The settings gates default on here (no settings UI in the spike). */
  const settings = { sound: true, clicks: true, carriage: true };
  let actx = null;
  const AC = () => {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    return actx;
  };
  function noise(dur) {
    const ctx = AC();
    const buf = ctx.createBuffer(1, Math.max(1, ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  }
  function burst(dur, shape) {
    const ctx = AC();
    const buf = ctx.createBuffer(1, Math.max(1, ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, shape);
    const src = ctx.createBufferSource(); src.buffer = buf;
    return src;
  }
  function thock() {
    if (!settings.sound || !settings.clicks) return;
    const ctx = AC(), t = ctx.currentTime;
    const v = 0.15 + Math.random() * 0.05;
    const nd = 0.02 + Math.random() * 0.006;
    const src = burst(nd, 2.8);
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1500 + Math.random() * 1300; bp.Q.value = 0.6;
    const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 500;
    const g = ctx.createGain(); g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(0.0001, t + nd);
    src.connect(bp); bp.connect(hp); hp.connect(g); g.connect(ctx.destination);
    src.start(t); src.stop(t + nd);
  }
  function bell(vol) {
    if (!settings.sound) return;
    const ctx = AC(), t = ctx.currentTime; vol = vol || 0.11;
    [1046, 1568, 2349].forEach((f, i) => {
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = ctx.createGain(); const v = vol * (i === 0 ? 1 : 0.45 / i);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(v, t + 0.006);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
      o.connect(g).connect(ctx.destination); o.start(t); o.stop(t + 0.55);
    });
  }
  function zip(vol, dur) {
    if (!settings.sound) return;
    const ctx = AC(), t = ctx.currentTime; dur = dur || 0.14; vol = vol || 0.11;
    const src = ctx.createBufferSource(); src.buffer = noise(dur);
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.1;
    bp.frequency.setValueAtTime(2600, t); bp.frequency.exponentialRampToValueAtTime(700, t + dur);
    const g = ctx.createGain(); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(bp).connect(g).connect(ctx.destination); src.start(t); src.stop(t + dur);
  }
  function carriageReturn() {
    if (!settings.sound || !settings.carriage) return;
    const ctx = AC(), t = ctx.currentTime;
    const sd = 0.12;
    const src = burst(sd, 0.5);
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(3400, t); lp.frequency.exponentialRampToValueAtTime(820, t + sd);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.045, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + sd);
    src.connect(lp).connect(g).connect(ctx.destination); src.start(t); src.stop(t + sd);
    const tt = t + 0.10;
    const nb = burst(0.05, 2);
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 250; bp.Q.value = 1.3;
    const ng = ctx.createGain(); ng.gain.setValueAtTime(0.13, tt); ng.gain.exponentialRampToValueAtTime(0.0001, tt + 0.05);
    nb.connect(bp).connect(ng).connect(ctx.destination); nb.start(tt); nb.stop(tt + 0.05);
    const o = ctx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(150, tt); o.frequency.exponentialRampToValueAtTime(64, tt + 0.06);
    const og = ctx.createGain(); og.gain.setValueAtTime(0.10, tt); og.gain.exponentialRampToValueAtTime(0.0001, tt + 0.07);
    o.connect(og).connect(ctx.destination); o.start(tt); o.stop(tt + 0.08);
  }
  const carriage = carriageReturn;     // commit() calls carriage()

  // iOS won't make sound until the context is unlocked inside a real gesture
  let audioReady = false;
  function unlockAudio() {
    if (audioReady) return;
    audioReady = true;
    const ctx = AC();
    const b = ctx.createBuffer(1, 1, ctx.sampleRate);
    const s = ctx.createBufferSource(); s.buffer = b; s.connect(ctx.destination); s.start(0);
  }

  /* ---------- keep the active line on the strike line ---------- */
  const strikeY = () => {
    const vv = window.visualViewport;
    return (vv ? vv.offsetTop : 0) + (vv ? vv.height : window.innerHeight) * 0.42;
  };
  const currentY = () => {
    const m = /translate\(-50%,\s*([-\d.]+)px\)/.exec(paper.style.transform || '');
    return m ? parseFloat(m[1]) : 0;
  };
  function caretRect() {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return active.getBoundingClientRect();
    const r = sel.getRangeAt(0).cloneRange();
    let rect = r.getBoundingClientRect();
    if (!rect || (rect.width === 0 && rect.height === 0)) {
      const mark = document.createElement('span'); mark.textContent = '​';
      try { r.insertNode(mark); rect = mark.getBoundingClientRect(); const p = mark.parentNode; p.removeChild(mark); p.normalize(); } catch (e) {}
    }
    if (!rect || !rect.height) rect = active.getBoundingClientRect();
    return rect;
  }
  let raf = 0;
  function recenter() {
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      const rect = caretRect(); if (!rect) return;
      const caretMid = rect.top + rect.height / 2;
      paper.style.transform = `translate(-50%, ${currentY() + (strikeY() - caretMid)}px)`;
    });
  }

  /* ---------- commit: the live line locks into the past ---------- */
  function commit() {
    const text = active.innerText.replace(/​/g, '');
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = text;             // textContent => inert, not editable
    locked.appendChild(div);
    active.innerHTML = '';
    carriage();
    recenter();
  }

  /* ---------- wiring ---------- */
  active.addEventListener('beforeinput', (e) => {
    unlockAudio();                      // first keystroke unlocks WebAudio on iOS
    if (e.inputType === 'insertParagraph' || e.inputType === 'insertLineBreak') {
      e.preventDefault();               // return commits the line instead of adding a newline
      commit();
      return;
    }
    if (e.inputType && e.inputType.startsWith('insert')) thock();
  });
  active.addEventListener('touchstart', unlockAudio, { passive: true });
  active.addEventListener('input', recenter);
  // backspace at the very start of an empty line does nothing — you can't reach
  // back into locked text. (Soften later if we want a one-line "undo commit".)
  active.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
  });
  document.addEventListener('selectionchange', () => { if (document.activeElement === active) recenter(); });
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', recenter);
    window.visualViewport.addEventListener('scroll', recenter);
  }
  window.addEventListener('resize', recenter);
  // tapping anywhere drops you back on the live line — the past isn't for editing
  document.addEventListener('click', (e) => { if (!e.target.closest('#foot')) active.focus(); });

  /* ---------- keep / burn ---------- */
  function plainText() {
    const past = [...locked.querySelectorAll('.line')].map(d => d.textContent);
    const cur = active.innerText.replace(/​/g, '');
    return [...past, cur].join('\n').replace(/\n{3,}/g, '\n\n').trim();
  }
  function reset() { locked.innerHTML = ''; active.innerHTML = ''; recenter(); active.focus(); }
  document.getElementById('keep').addEventListener('click', () => {
    const text = plainText(); if (!text) return;
    unlockAudio();
    zip(0.16, 0.42);                    // paper pulled from the platen, like saveNow
    setTimeout(() => bell(0.1), 300);   // the little finish chime
    if (window.typeAPI && window.typeAPI.saveNote) {
      const now = new Date();
      const stamp = now.toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' });
      const words = (text.match(/\S+/g) || []).length;
      const front = `---\ndate: ${now.toISOString().slice(0,10)}\nkept: ${stamp}\nwords: ${words}\n---\n\n`;
      const fileStamp = now.toISOString().slice(0,19).replace(/[:T]/g,'-');
      window.typeAPI.saveNote({ dir: null, content: front + text + '\n', filename: `type-${fileStamp}.md` });
    }
    reset();
  });
  document.getElementById('burn').addEventListener('click', reset);

  window.addEventListener('load', () => { active.focus(); recenter(); });
  active.focus();
</script>
</body>
</html>
