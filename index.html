    let prose = [];
    const flushProse = () => {
      if (!prose.length) return;
      for (const l of wrapText(prose.join(' '), MAX_COLS)) newUser.push(l);
      prose = [];
    };
    let i = 0;
    while (i < user.length) {
      const ln = user[i];
      if (ln === '') { flushProse(); newUser.push(''); i++; continue; }

      // blockquote: run of consecutive "> " lines
      if (ln.startsWith('> ')) {
        flushProse();
        const body = [];
        while (i < user.length && user[i].startsWith('> ')) { body.push(user[i].slice(2)); i++; }
        const wrapped = wrapText(body.join(' '), Math.max(4, MAX_COLS - 2));
        for (const l of wrapped) newUser.push('> ' + l);
        continue;
      }

      // heading: one "# … " line + any "  " continuations
      let m = ln.match(/^(#{1,6}) /);
      if (m) {
        flushProse();
        const markerLen = m[0].length;
        const parts = [ln.slice(markerLen)];
        i++;
        while (i < user.length && user[i].startsWith('  ')) { parts.push(user[i].slice(2)); i++; }
        const wrapped = wrapText(parts.join(' '), Math.max(4, MAX_COLS - markerLen));
        if (!wrapped.length) wrapped.push('');
        newUser.push(m[0] + wrapped[0]);
        for (let j = 1; j < wrapped.length; j++) newUser.push('  ' + wrapped[j]);
        continue;
      }

      // bullet item: one "- " / "* " line + any "  " continuations
      m = ln.match(/^([-*]) /);
      if (m) {
        flushProse();
        const marker = m[0];
        const parts = [ln.slice(2)];
        i++;
        while (i < user.length && user[i].startsWith('  ')) { parts.push(user[i].slice(2)); i++; }
        const wrapped = wrapText(parts.join(' '), Math.max(4, MAX_COLS - 2));
        if (!wrapped.length) wrapped.push('');
        newUser.push(marker + wrapped[0]);
        for (let j = 1; j < wrapped.length; j++) newUser.push('  ' + wrapped[j]);
        continue;
      }

      prose.push(ln);
      i++;
    }
    flushProse();

    const newLocked = newQuote.concat(newUser);
    const newUserFloor = newQuote.length;

    // No-op if nothing actually changed
    if (newUserFloor === userFloor && newLocked.length === locked.length && newLocked.every((l, i) => l === locked[i])) return;

    locked = newLocked;
    userFloor = newUserFloor;
    if (quoteHold) quoteHold.floor = userFloor;

    // --- 3. Rebuild the feed DOM from the new locked array ---
    // applyMdClass inspects previousElementSibling for -cont detection,
    // so the element must be parented before classes are applied.
    feed.innerHTML = '';
    const attribStart = userFloor - 1 - attribCount;    // first index of attribution band
    for (let i = 0; i < locked.length; i++) {
      const el = document.createElement('div');
      el.className = 'line';
      if (i < userFloor) {
        el.classList.add('quoteline');
        if (i >= attribStart && i < userFloor - 1 && locked[i] !== '') el.classList.add('attrib');
      }
      for (const c of locked[i]) el.appendChild(inkSpan(c));
      feed.appendChild(el);
      applyMdClass(el, locked[i]);
    }
    activeEl = null;
    renderActive();
    persistDraft();
  }

  function quoteCommitSilent(cls) {           // commit the active line with no sound, no slide
    if (activeEl) {
      activeEl.classList.remove('cr');
      if (cls) activeEl.classList.add(cls);
      renderInto(activeEl, current, accentPeriod);
    }
    locked.push(current);
    current = '';
    activeEl = null;
    bellRung = false;
    renderActive();
    layout();
  }

  function seedQuote(forced) {
    const list = window.TYPE_QUOTES;
    if (phase !== 'writing' || quotePlaying) return;
    const q = forced || (list && list.length ? list[Math.floor(Math.random() * list.length)] : null);
    if (!q) return;
    activeQuote = q;
    accentPeriod = false;
    const bodyLines = wrapText(q.text, MAX_COLS);          // typed out, full size
    const attribLines = wrapText('— ' + (q.author || 'Unknown'), MAX_COLS);  // author only
    quotePlaying = true;
    let timers = [];
    let nextLine = 0;
    let firstSentenceDone = false;

    // the author is a quiet caption, not typed — it just settles in under the quote
    const placeAttributionAndEnd = () => {
      timers.forEach(clearTimeout); timers = [];
      for (const a of attribLines) { current = a; quoteCommitSilent('attrib'); }
      quoteCommitSilent();                    // gap, then you write on a fresh line
      quoteHold = { floor: locked.length };   // keep the quote in place until you've written under it
      userFloor = locked.length;              // your writing starts here — the quote doesn't count
      for (let i = 0; i < userFloor && i < feed.children.length; i++) feed.children[i].classList.add('quoteline');
      quoteShown = true;                      // show the remove-× to the right of the quote
      layout();
      quotePlaying = false; quoteSkip = null;
    };

    const CHAR = 40;   // deliberate, like a person typing it out
    const typeLine = (idx) => {
      if (idx >= bodyLines.length) { placeAttributionAndEnd(); return; }
      nextLine = idx;
      current = '';
      const lineText = bodyLines[idx];
      let t = 0;
      for (let k = 0; k < lineText.length; k++) {
        const c = lineText[k];
        timers.push(setTimeout(() => { current += c; renderActive(); }, t));
        t += CHAR + Math.random() * 12;                                   // a little human jitter
        const endsSentence = /[.!?]/.test(c) && !/[.!?]/.test(lineText[k + 1] || '');
        if (endsSentence) { t += firstSentenceDone ? 280 : 520; firstSentenceDone = true; }  // pause to think
        else if (/[,;:]/.test(c)) t += 130;                               // a small breath
      }
      timers.push(setTimeout(() => { quoteCommitSilent(); typeLine(idx + 1); }, t + 80));
    };

    quoteSkip = () => {                        // a keystroke finishes the quote instantly
      timers.forEach(clearTimeout); timers = [];
      for (let i = nextLine; i < bodyLines.length; i++) { current = bodyLines[i]; quoteCommitSilent(); }
      placeAttributionAndEnd();
    };

    typeLine(0);
  }

  /* ================= WELCOME (first run only) ================= */
  // Types short, punchy lines the first time someone opens the app. Each one
  // lands and scrolls up; then the whole thing rolls off and the quote arrives.
  const WELCOME = [
    "A place to just write.",
    "No editing. You can't go back, so don't try.",
    "Just get the thought out.",
    "Clean it up later.",
    "A journal entry.",
    "A blog post.",
    "The first page of your book.",
    "Keep it.",
    "Or, burn it.",
    "Type."
  ];
  const seenWelcome = () => { try { return localStorage.getItem('type.welcomed') === '1'; } catch (e) { return true; } };
  const markWelcomed = () => { try { localStorage.setItem('type.welcomed', '1'); } catch (e) {} };

  function seedWelcome(onDone) {
    if (phase !== 'writing' || quotePlaying) return;
    const lines = [];
    WELCOME.forEach(p => wrapText(p, MAX_COLS).forEach(l => lines.push(l)));
    const last = lines.length - 1;
    quotePlaying = true;
    let timers = [];
    let idx = 0;
    let prevEl = null;
    const CHAR = 45;          // slow, deliberate keystrokes
    const LINE_PAUSE = 520;   // a clear beat after each punchy line

    const hold = () => {                       // welcome just stays put (skipped, or quotes off)
      accentPeriod = false;
      quotePlaying = false; quoteSkip = null;
      quoteHold = { floor: locked.length };
      userFloor = locked.length;              // the welcome doesn't count toward your word count
      layout();
    };
    const finishLast = () => {                 // commit "type." without the scroll jump, then hand off
      timers.forEach(clearTimeout); timers = [];
      quoteHold = { floor: locked.length };    // hold so the last line doesn't scroll up a notch
      quoteCommitSilent();                      // renders the burnt-orange period (accentPeriod is on)
      const c = feed.querySelector('.caret'); if (c) c.remove();   // no cursor below "Type." while it sits
      accentPeriod = false;
      quotePlaying = false; quoteSkip = null;
      userFloor = locked.length;
      if (onDone) {
        const floorNow = locked.length;
        timers.push(setTimeout(() => {
          if (!frozen && !quotePlaying && locked.length === floorNow && current === '') fadeWelcomeToQuote(onDone);
        }, 2000));   // let "Type." sit for two seconds
      }
    };
    const typeLine = (i) => {
      idx = i;
      if (i > last) { hold(); return; }
      accentPeriod = (i === last);            // the closing "just type." keeps the burnt-orange period
      if (prevEl) { prevEl.classList.add('welcome-fade'); prevEl = null; }   // the last line fades as this one begins
      current = '';
      let t = 0;
      for (const ch of lines[i]) { const c = ch; timers.push(setTimeout(() => { current += c; renderActive(); }, t)); t += CHAR; }
      timers.push(setTimeout(() => {
        if (i === last) { finishLast(); return; }
        quoteCommitSilent();
        prevEl = feed.children[feed.children.length - 2] || null;   // the line just committed
        typeLine(i + 1);
      }, t + LINE_PAUSE));
    };
    quoteSkip = () => {
      timers.forEach(clearTimeout); timers = [];
      for (let i = idx; i <= last; i++) { accentPeriod = (i === last); current = lines[i]; quoteCommitSilent(); }
      hold();
    };
    typeLine(0);
  }

  // freeze the welcome as a fading ghost, clear to a fresh sheet, then type the quote in
  function fadeWelcomeToQuote(cb) {
    const caret = feed.querySelector('.caret'); if (caret) caret.remove();
    // freeze already-faded lines at 0 so the clone doesn't replay their fade (the flash)
    feed.querySelectorAll('.welcome-fade').forEach(el => { el.classList.remove('welcome-fade'); el.style.opacity = '0'; });
    const m = /translateY\(([-\d.]+)px\)/.exec(feed.style.transform || '');
    const baseY = m ? parseFloat(m[1]) : 0;
    const ghost = feed.cloneNode(true);
    ghost.removeAttribute('id');
    ghost.classList.remove('eject');
    ghost.classList.add('ghost');
    ghost.style.transform = `translateY(${baseY}px)`;   // hold the welcome where it sits
    feed.parentElement.appendChild(ghost);
    newSheet();                                       // clean sheet for the quote (snaps, no drop)
    requestAnimationFrame(() => {                     // the welcome fades while drifting up
      ghost.style.opacity = '0';
      ghost.style.transform = `translateY(${baseY - 40}px)`;
    });
    setTimeout(() => ghost.remove(), 1000);
    // quote types in once the welcome is mostly gone, so it doesn't type over it
    if (cb) setTimeout(() => { if (!frozen && !quotePlaying && locked.length === 0 && current === '') cb(); }, 480);
  }

  function skipIntro() {
    introTimers.forEach(clearTimeout); introTimers = [];
    if (activeEl) {
      activeEl.style.transition = ''; activeEl.style.transform = 'translateX(0)';
      activeEl.classList.remove('intro-line');
      activeEl.textContent = ''; activeEl.appendChild(caretEl());
    }
    current = '';
    phase = 'writing';
    layout();
    nudgeHints();
  }

  /* ================= WRITING ================= */
  function renderActive(cr) {
    if (!activeEl) {
      activeEl = document.createElement('div');
      activeEl.className = 'line';
      feed.appendChild(activeEl);
    }
    if (cr) activeEl.classList.add('cr');
    applyMdClass(activeEl, current);            // live: style snaps on as soon as "# ", "> ", or "- " is typed
    renderInto(activeEl, current, accentPeriod);
    activeEl.appendChild(caretEl());
  }

  // active line is pinned to the strike point (vertical middle); finished lines
  // roll up above it and fade under the veil.
  function layout() {
    const lh = LINE_H_PX();
    // the page stays put — overstriking moves only the block cursor across the
    // committed lines that are already visible, never the page itself
    let offset = 0;
    if (cursor && settings.editable) {
      // editable page: roll the platen back so the line under the cursor
      // comes down to the strike point — the words come to you
      offset = locked.length - cursor.line;
    } else if (quoteHold) {
      const d = locked.length - quoteHold.floor;    // lines you've committed since the quote
      const H = QUOTE_HOLD_ROWS;
      if (d <= H) offset = d;                       // hold: quote frozen, cursor descends
      else if (d <= 2 * H) offset = 2 * H - d;      // catch up: roll back to the strike point
      else { offset = 0; quoteHold = null; }        // done — ordinary centered writing
    }
    feed.style.transform = `translateY(${-(locked.length - offset) * lh}px)`;
    positionQuoteX();
  }

  function commitLine() {
    if (activeEl) {
      activeEl.classList.remove('cr');
      activeEl.textContent = '';
      for (const c of current) activeEl.appendChild(inkSpan(c));
    }
    locked.push(current);
    current = '';
    activeEl = null;
    bellRung = false;
    renderActive(true);     // new line sweeps in (carriage return)
    layout();
    carriageReturn();       // swish + seat-chunk back to the margin
  }

  function newSheet() {
    locked = []; current = ''; activeEl = null; bellRung = false;
    quoteHold = null;
    sheetStart = null;
    userFloor = 0;
    quoteShown = false;
    cursor = null;
    stage.classList.remove('overstriking');
    coolSmolder();
    clearDraft();
    feed.innerHTML = '';
    feed.classList.remove('eject');
    feed.style.transition = 'none';            // snap back to the top — no cursor sliding down
    feed.style.transform = 'translateY(0)';
    void feed.offsetWidth;                      // commit it before re-enabling the transition
    feed.style.transition = '';
    renderActive();
    layout();
    updateMeter();
  }

  function pushChar(c) {
    // double-space -> period (only after a word, not after punctuation).
    // a typing affordance only — pasted text keeps its spaces as written.
    if (!pasting && c === ' ' && current.endsWith(' ') && !current.endsWith('  ') &&
        /[\w)"'\]]/.test(current[current.length - 2] || '')) {
      current = current.slice(0, -1) + '. ';
      renderActive();
      if (!bellRung && current.length >= BELL_AT) { bellRung = true; if (settings.bell) bell(0.09); }
      return;
    }
    if (current.length < MAX_COLS) {
      current += c;
      renderActive();
      if (!bellRung && current.length === BELL_AT) { bellRung = true; if (settings.bell) bell(0.09); }
      return;
    }
    // wrapped md lines carry a prefix on the carry-over so the continuation
    // styles the same — blockquote uses "> " on every line, bullets/headings
    // use a 2-space hang so saved markdown stays valid
    let wrapPrefix = '';
    if (activeEl) {
      const cl = activeEl.classList;
      if (cl.contains('md-quote')) wrapPrefix = '> ';
      else if (cl.contains('md-bullet') || cl.contains('md-bullet-cont') ||
               cl.contains('md-heading') || cl.contains('md-heading-cont')) wrapPrefix = '  ';
    }
    const lastSpace = current.lastIndexOf(' ');
    if (c !== ' ' && lastSpace > MAX_COLS * 0.5) {
      const carry = current.slice(lastSpace + 1);
      current = current.slice(0, lastSpace);
      commitLine();
      current = wrapPrefix + carry + c;
      renderActive();
    } else {
      commitLine();
      if (c !== ' ') { current = wrapPrefix + c; renderActive(); }
      else if (wrapPrefix) { current = wrapPrefix; renderActive(); }
    }
  }

  /* ================= SAVE (eject + stamp) ================= */
  function save() {
    if (frozen || phase !== 'writing') return;
    frozen = true;
    coolSmolder();
    const prose = [...locked, current].join('\n').replace(/\s+$/,'');
    const words = (prose.match(/\S+/g) || []).length;
    const now = new Date();
    // a small YAML frontmatter so kept pages are self-dating; tools like Obsidian
    // hide it, and the prose still reads as a plain page underneath.
    const stamp = now.toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' });
    const front = `---\ndate: ${now.toISOString().slice(0,10)}\nkept: ${stamp}\nwords: ${words}\n---\n\n`;
    const body = front + prose + '\n';
    const fileStamp = now.toISOString().slice(0,16).replace(/[:T]/g,'-');
    const filename = `type-${fileStamp}.md`;

    if (window.typeAPI && window.typeAPI.saveNote) {
      // desktop: write a .md file to the chosen folder (or Downloads).
      // iOS: the bridge writes it into iCloud Drive → type.
      window.typeAPI.saveNote({ dir: settings.saveDir || null, content: body, filename });
    } else {
      // browser: download a .md file
      const blob = new Blob([body], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    const caret = feed.querySelector('.caret'); if (caret) caret.remove();
    zip(0.16, 0.42);                            // paper pulled from platen
    // lift from wherever the sheet currently sits — on a long page layout() has
    // already scrolled feed up to keep the active line centered, so an absolute
    // target would pull the sheet *down* into view. read the current Y and lift
    // another ~130vh past it: the whole sheet clears the top of the platen at any
    // length, and this reduces to the old -130vh for a short page at translateY(0).
    const m = /translateY\(([-\d.]+)px\)/.exec(feed.style.transform || '');
    const currentY = m ? parseFloat(m[1]) : 0;
    feed.classList.add('eject');
    requestAnimationFrame(() => { feed.style.transform = `translateY(${currentY - window.innerHeight * 1.3}px)`; });

    // Stamp pops in just after the lift completes (lift = 550ms with the
    // pull-then-rip curve), so it lands on a clean empty platen — not over
    // the page. Stamp animation is 2.0s; cleanup waits past that.
    setTimeout(() => {
      stampDate.textContent = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase().replace(/,/g,'');
      stampKept.textContent = words === 1 ? '1 word kept' : `${words} words kept`;
      stampEl.classList.remove('show'); void stampEl.offsetWidth;
      stampEl.classList.add('show');
      bell(0.1);
    }, 620);

    setTimeout(() => { stampEl.classList.remove('show'); newSheet(); frozen = false; }, 2720);
  }

  /* ================= BURN (ember + smoke + stillness) ================= */
  function makeEmbers() {
    // sparks rise from across the burning text — not all from one row.
    // Spawn Y is random across the visible text's Y range (first char's
    // top → last char's bottom), biased toward the top with pow(rand, 1.6)
    // so most embers come from higher up where the older lines are.
    const allChars = feed.querySelectorAll('.ch');
    const firstRect = allChars.length ? allChars[0].getBoundingClientRect() : feed.getBoundingClientRect();
    const lastRect  = allChars.length ? allChars[allChars.length - 1].getBoundingClientRect() : firstRect;
    const colRect   = feed.getBoundingClientRect();
    const vh = window.innerHeight, vw = window.innerWidth;
    const topPct    = (firstRect.top    / vh) * 100;
    const bottomPct = (lastRect.bottom  / vh) * 100;
    const ySpanPct  = Math.max(0, bottomPct - topPct);
    const colLeftPct  = (colRect.left  / vw) * 100;
    const colWidthPct = ((colRect.right - colRect.left) / vw) * 100;
    for (let i = 0; i < 12; i++) {
      const e = document.createElement('span');
      e.className = 'ember';
      e.style.left = (colLeftPct + Math.random() * colWidthPct) + '%';
      e.style.top  = (topPct + Math.pow(Math.random(), 1.6) * ySpanPct) + '%';
      // three kinds of sparks, roughly:
      //   ~2/12 floaters   — barely rise, hang in a pocket of warm air
      //   ~3/12 lingerers  — climb medium-high, slow burn
      //   ~7/12 regulars   — short curve up and out
      const kind = Math.random();
      let rise, dur;
      if (kind < 0.18) {                       // floater
        rise = 25  + Math.random() * 55;       // 25 → 80px
        dur  = 3100 + Math.random() * 1600;    // 15% faster than before
      } else if (kind < 0.42) {                // lingerer
        rise = 220 + Math.random() * 200;      // 220 → 420px
        dur  = 3300 + Math.random() * 1400;
      } else {                                 // regular
        rise = 90  + Math.random() * 160;      // 90 → 250px
        dur  = 2100 + Math.random() * 950;
      }
      const drift = (Math.random() * 110 - 55);                   // ±55px lateral end position
      // per-spark bezier curve: control point biases the path one way then
      // the other so each ember has its own gentle wander. The randomized
      // control X/Y means no two sparks share the same trajectory.
      const ctrlX = drift * (0.2 + Math.random() * 0.5) + (Math.random() - 0.5) * 28;
      const ctrlY = -rise * (0.28 + Math.random() * 0.18);
      e.style.offsetPath = `path("M 0 0 Q ${ctrlX.toFixed(1)} ${ctrlY.toFixed(1)}, ${drift.toFixed(1)} ${(-rise).toFixed(1)}")`;
      e.style.animationDuration = dur + 'ms';
      e.style.animationDelay = (Math.random() * 600) + 'ms';
      stage.appendChild(e);
      setTimeout(() => e.remove(), Math.round(dur + 700));
    }
  }
  function makeSmoke() {
    for (let i = 0; i < 5; i++) {
      const s = document.createElement('div');
      s.className = 'smoke';
      s.style.left = (26 + Math.random() * 34) + '%';
      s.style.top  = (30 + Math.random() * 14) + '%';
      s.style.animationDelay = (i * 230) + 'ms';
      stage.appendChild(s);
      requestAnimationFrame(() => s.classList.add('go'));
      setTimeout(() => s.remove(), 2300);
    }
  }
  /* ================= FEEDBACK MODE ================= */
  // open a writing surface that sends what you type to Kelly. the current
  // page is stashed in memory (and the existing on-disk draft is left alone
  // as a safety net), then restored when you send or cancel.
  let feedbackMode = false;
  let stashedSheet = null;
  const feedbackLabel = document.getElementById('feedbackLabel');
  const feedbackPaused = document.getElementById('feedbackPaused');
  const hintsNormal = document.getElementById('hintsNormal');
  const hintsFeedback = document.getElementById('hintsFeedback');
  // Feedback is launched from the footer link at the bottom of the settings
  // panel ("v1.3.7 · feedback · why?"). The element is created in JS earlier.
  const footFeedback = document.getElementById('footFeedback');
  let feedbackPausedTimer = null;

  function enterFeedbackMode() {
    if (feedbackMode || frozen) return;
    if (quotePlaying && quoteSkip) quoteSkip();
    // stash everything that defines the current sheet
    const hadContent = (locked && locked.length > 0) || (current && current.length > 0);
    stashedSheet = {
      locked: locked.slice(),
      current,
      userFloor,
      quoteShown,
      activeQuote,
      quoteHold,
    };
    feedbackMode = true;
    document.body.classList.add('feedback');
    settingsEl.hidden = true;
    hintsNormal.hidden = true;
    hintsFeedback.hidden = false;
    newSheet();
    phase = 'writing';
    accentPeriod = false;
    // seed the prompt using the same path quotes use — quoteCommitSilent
    // writes `current` into the active line, then creates a fresh active
    // line for the next thing. avoids duplicating cursor elements.
    // Two lines: the question itself + a quiet note that email is welcome so
    // Kelly can follow up if anything needs clarifying.
    const promptSegments = [
      "What's on your mind?",
      "Add your email if you'd like a reply.",
    ];
    for (let s = 0; s < promptSegments.length; s++) {
      for (const ln of wrapText(promptSegments[s], MAX_COLS)) {
        current = ln;
        quoteCommitSilent('attrib');
      }
      quoteCommitSilent();    // blank gap line after each prompt segment
    }
    userFloor = locked.length;
    // mark the seeded lines as quotelines so they're styled like quote text
    for (let i = 0; i < userFloor && i < feed.children.length; i++) {
      feed.children[i].classList.add('quoteline');
    }
    layout();
    // "page paused" stays visible the WHOLE feedback session if there was
    // writing — fades only when feedback mode exits. this is the visible
    // promise that the writing isn't lost.
    if (hadContent) {
      feedbackPaused.textContent = "page paused. back when you're done.";
      feedbackPaused.classList.add('show');
    }
  }

  function exitFeedbackMode(sent) {
    if (!feedbackMode) return;
    feedbackMode = false;
    document.body.classList.remove('feedback');
    hintsNormal.hidden = false;
    hintsFeedback.hidden = true;
    clearTimeout(feedbackPausedTimer);
    feedbackPaused.classList.remove('show');
    // restore the previous sheet
    if (stashedSheet) {
      locked = stashedSheet.locked.slice();
      current = stashedSheet.current || '';
      userFloor = stashedSheet.userFloor || 0;
      quoteShown = !!stashedSheet.quoteShown;
      activeQuote = stashedSheet.activeQuote || null;
      quoteHold = stashedSheet.quoteHold || null;
      feed.innerHTML = '';
      locked.forEach((ln, idx) => {
        const el = document.createElement('div');
        el.className = 'line';
        if (idx < userFloor) el.classList.add('quoteline');
        for (const c of ln) el.appendChild(inkSpan(c));
        feed.appendChild(el);
      });
      activeEl = null;
      renderActive();
      layout();
      persistDraft();
      updateMeter();
    }
    stashedSheet = null;
    if (sent) {
      // tiny "sent." indicator — uses the paused-toast slot, fades after 2s
      feedbackPaused.textContent = 'sent.';
      feedbackPaused.classList.add('show');
      feedbackPausedTimer = setTimeout(() => {
        feedbackPaused.classList.remove('show');
        setTimeout(() => { feedbackPaused.textContent = "page paused. back when you're done."; }, 400);
      }, 1800);
    }
  }

  async function sendFeedback() {
    if (!feedbackMode) return;
    // collect the user's typed text (skip the seeded prompt lines)
    const lines = locked.slice(userFloor);
    if (current) lines.push(current);
    const text = lines.join('\n').replace(/^\n+/, '').trimEnd();
    if (!text) return;   // nothing typed
    if (!window.typeAPI || !window.typeAPI.sendFeedback) return;
    const res = await window.typeAPI.sendFeedback({ body: text });
    if (res && res.ok) exitFeedbackMode(true);
    // if cancelled in the confirm dialog or errored, stay in feedback mode
    // (user can edit and try again, or hit esc)
  }

  if (footFeedback) footFeedback.addEventListener('click', () => {
    // close the settings panel as we drop into the feedback surface
    settingsEl.hidden = true;
    enterFeedbackMode();
  });

  function burn() {
    if (frozen || phase !== 'writing') return;
    frozen = true;
    coolSmolder();
    const caret = feed.querySelector('.caret'); if (caret) caret.remove();
    const chars = [...feed.querySelectorAll('.ch')];
    chars.forEach((s, i) => {
      s.classList.add('ash');
      s.style.setProperty('--delay', Math.min(700, i * 4 + Math.random() * 160) + 'ms');
      // no per-char Y drift — chars fade in place; the timing stagger above
      // is what gives the burn its uneven, paper-charring character
    });
    whoosh();
    makeEmbers();
    // no smoke puffs — the sparks carry the moment on their own, and they
    // echo the burnt-orange period in the wordmark
    setTimeout(() => {
      newSheet(); frozen = false;
      if (settings.quoteBurn) setTimeout(seedQuote, 450);   // a quote types in after the burn, then rolls up as you write
    }, 3000);  // a held beat before the fresh sheet (the char-burn runs longer)
  }

  /* ================= SMOLDER (burn if you stop) ================= */
  // Opt-in. Sit idle with words on the page and a warm vignette creeps in; keep
  // sitting and the whole sheet burns itself. Any keystroke cools it back down.
  // total idle-to-burn time is a setting (10 / 30 / 60s): ~35% grace, then ~65% visible smolder
  function smolderTimes() {
    const total = (settings.smolderSecs || 10) * 1000;
    return { warn: Math.round(total * 0.35), burn: Math.round(total * 0.65) };
  }
  const smolderVeil = document.getElementById('smolderVeil');
  let smolderWarnTimer = null, smolderBurnTimer = null, smolderEmberTimer = null;
  let smoldering = false;

  function hasContent() { return locked.length > 0 || current.length > 0; }

  function smolderEmbers() {
    for (let i = 0; i < 3; i++) {
      const e = document.createElement('span');
      e.className = 'ember';
      e.style.left = (8 + Math.random() * 84) + '%';
      e.style.top  = (40 + Math.random() * 46) + '%';
      e.style.setProperty('--x', (Math.random() * 40 - 20).toFixed(1) + 'px');
      e.style.setProperty('--y', (-28 - Math.random() * 44).toFixed(1) + 'px');
      e.style.animationDelay = (Math.random() * 320) + 'ms';
      stage.appendChild(e);
      setTimeout(() => e.remove(), 1200);
    }
  }

  function coolSmolder() {
    clearTimeout(smolderWarnTimer); smolderWarnTimer = null;
    clearTimeout(smolderBurnTimer); smolderBurnTimer = null;
    clearInterval(smolderEmberTimer); smolderEmberTimer = null;
    if (smoldering) { smoldering = false; stage.classList.remove('smoldering'); }
  }

  function smolderTone() {                 // a low, ominous swell when the page starts to smolder
    if (!settings.sound) return;
    const ctx = AC(), t = ctx.currentTime;
    const o = ctx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(116, t); o.frequency.linearRampToValueAtTime(88, t + 0.9);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.05, t + 0.3);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.1);
    o.connect(g).connect(ctx.destination); o.start(t); o.stop(t + 1.2);
  }

  function startSmolder() {
    if (!settings.smolder || phase !== 'writing' || frozen || !hasContent()) return;
    const { burn: burnMs } = smolderTimes();
    smoldering = true;
    smolderVeil.style.setProperty('--smolder-dur', burnMs + 'ms');   // veil grows over the whole smolder
    stage.classList.add('smoldering');
    smolderTone();
    smolderEmbers();
    smolderEmberTimer = setInterval(smolderEmbers, 560);
    smolderBurnTimer = setTimeout(() => { coolSmolder(); burn(); }, burnMs);
  }

  function scheduleSmolder() {
    clearTimeout(smolderWarnTimer);
    if (!settings.smolder || phase !== 'writing' || frozen || !hasContent()) return;
    smolderWarnTimer = setTimeout(startSmolder, smolderTimes().warn);
  }

  function resetSmolder() { coolSmolder(); scheduleSmolder(); }

  /* ================= DRAFT (crash recovery) ================= */
  // The in-progress sheet is mirrored to localStorage so an accidental quit or
  // crash doesn't lose it. Keeping or burning clears it, so a draft only ever
  // survives an unclean exit — there is no history, nothing to scroll back to.
  const DRAFT_KEY = 'type.draft';
  let draftTimer = null;
  function persistDraft() {
    clearTimeout(draftTimer);
    draftTimer = setTimeout(() => {
      try {
        if (phase !== 'writing' || !hasContent()) { localStorage.removeItem(DRAFT_KEY); return; }
        localStorage.setItem(DRAFT_KEY, JSON.stringify({ locked, current }));
      } catch (e) {}
    }, 350);
  }
  function clearDraft() {
    clearTimeout(draftTimer);
    try { localStorage.removeItem(DRAFT_KEY); } catch (e) {}
  }
  function readDraft() {
    try {
      const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || 'null');
      if (d && Array.isArray(d.locked) && typeof d.current === 'string') return d;
    } catch (e) {}
    return null;
  }
  function restoreDraft(d) {
    introEl.style.display = 'none';
    locked = d.locked.slice();
    current = d.current || '';
    phase = 'writing';
    feed.innerHTML = '';
    for (const ln of locked) {
      const el = document.createElement('div');
      el.className = 'line';
      for (const c of ln) el.appendChild(inkSpan(c));
      feed.appendChild(el);
      applyMdClass(el, ln);                  // after append so -cont can see prev sibling
    }
    activeEl = null;
    renderActive();
    layout();
    hints.classList.remove('dim');
    scheduleSmolder();
  }

  /* ================= METER (word count + timer) ================= */
  // Live counts only appear inside the settings panel's session-stats line,
  // and only when the matching toggle is on — the writing surface stays clean.
  const setStatsWords = document.getElementById('setStatsWords');
  const setStatsPages = document.getElementById('setStatsPages');
  const setStatsTime  = document.getElementById('setStatsTime');
  // Standard manuscript page = 250 words. Conveniently also the 3-pages-a-day
  // target that long-form freewriting traditions converge on (750 words).
  const WORDS_PER_PAGE = 250;
  function ensureClock() { if (sheetStart === null) sheetStart = Date.now(); }
  function updateMeter() {
    const n = ((locked.slice(userFloor).join(' ') + ' ' + current).match(/\S+/g) || []).length;
    const wordsText = n === 1 ? '1 word' : n + ' words';
    const p = n / WORDS_PER_PAGE;
    const pagesText = p.toFixed(1) + (p === 1 ? ' page' : ' pages');
    // Always show a clock face; reads "0:00" until the first keystroke starts
    // the session, then ticks. Without this fallback the timer toggle would
    // look broken (blank) when the settings panel opens before any typing.
    let timeText = '0:00';
    if (sheetStart) {
      const s = Math.max(0, Math.floor((Date.now() - sheetStart) / 1000));
      timeText = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }
    setStatsWords.textContent = settings.wordCount ? wordsText : '';
    setStatsPages.textContent = settings.pages     ? pagesText : '';
    setStatsTime.textContent  = settings.timer     ? timeText  : '';
    updateEditableLock();
  }
  setInterval(updateMeter, 1000);
  updateMeter();

  /* ================= QUOTE REMOVE (×) + SHARE (↑) ================= */
  function positionQuoteX() {
    if (!quoteShown) {
      quoteX.style.display = 'none';
      quoteShare.style.display = 'none';
      return;
    }
    const ql = feed.querySelector('.quoteline');
    if (!ql) {
      quoteX.style.display = 'none';
      quoteShare.style.display = 'none';
      return;
    }
    const r = ql.getBoundingClientRect();
    const fr = feed.getBoundingClientRect();
    const x = (fr.right + 12) + 'px';
    quoteShare.style.display = 'block';
    quoteShare.style.left = x;
    quoteShare.style.top  = (r.top - 19) + 'px';   // share sits above the ×
    quoteX.style.display = 'block';
    quoteX.style.left = x;
    quoteX.style.top  = (r.top + 3) + 'px';
  }
  function removeQuote() {
    if (!quoteShown || userFloor <= 0) return;
    const n = userFloor;
    locked.splice(0, n);
    for (let i = 0; i < n && feed.firstChild; i++) feed.removeChild(feed.firstChild);
    userFloor = 0;
    quoteHold = null;
    quoteShown = false;
    activeQuote = null;
    quoteX.style.display = 'none';
    quoteShare.style.display = 'none';
    quoteShare.classList.remove('is-revealed');
    cursor = null;
    stage.classList.remove('overstriking');
    layout();
    persistDraft();
    updateMeter();
  }
  quoteX.addEventListener('click', removeQuote);

  // hover-only reveal for the share icon: visible whenever the pointer is
  // anywhere inside the quote's bounding rect (or over the icon hotspot).
  // computed on mousemove so gaps between lines, line padding, and the icon
  // column all count as "over the quote."
  let shareHideTimer = null;
  function revealShare() {
    if (!quoteShown) return;
    clearTimeout(shareHideTimer);
    quoteShare.classList.add('is-revealed');
  }
  function unrevealShare() {
    clearTimeout(shareHideTimer);
    shareHideTimer = setTimeout(() => quoteShare.classList.remove('is-revealed'), 80);
  }
  function pointerOverQuote(x, y) {
    if (!quoteShown) return false;
    const lines = feed.querySelectorAll('.quoteline');
    if (!lines.length) return false;
    let top = Infinity, bottom = -Infinity, left = Infinity, right = -Infinity;
    for (const el of lines) {
      const r = el.getBoundingClientRect();
      if (r.top < top) top = r.top;
      if (r.bottom > bottom) bottom = r.bottom;
      if (r.left < left) left = r.left;
      if (r.right > right) right = r.right;
    }
    // include the icon column on the right so moving from quote → icon stays revealed
    const sr = quoteShare.getBoundingClientRect();
    if (sr.width) {
      right = Math.max(right, sr.right + 6);
      top   = Math.min(top, sr.top - 6);
    }
    return x >= left && x <= right && y >= top && y <= bottom;
  }
  document.addEventListener('mousemove', (e) => {
    if (!quoteShown) return;
    if (pointerOverQuote(e.clientX, e.clientY)) revealShare();
    else unrevealShare();
  });

  // share the currently-seeded quote as a phone wallpaper PNG. renders on canvas
  // using the active theme's tokens, hands the PNG to the native share sheet
  // (AirDrop, Messages, Notes, Mail, …) via the bundled Swift helper.
  async function renderQuoteWallpaper(quote) {
    const W = 1290, H = 2796;                       // iPhone Pro Max-ish; scales fine on every device
    const styles = getComputedStyle(document.body);
    const paper  = (styles.getPropertyValue('--paper')     || '#ffffff').trim();
    const quiet  = (styles.getPropertyValue('--ink-quiet') || '#7c7f86').trim();
    const faint  = (styles.getPropertyValue('--ink-faint') || '#c2c4c9').trim();

    const QUOTE_PX  = 56;
    const ATTRIB_PX = 32;
    try {
      await document.fonts.load(`${QUOTE_PX}px "Courier Prime"`);
      await document.fonts.load(`${ATTRIB_PX}px "Courier Prime"`);
    } catch (_) {}

    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = paper;
    ctx.fillRect(0, 0, W, H);
    ctx.textBaseline = 'top';

    const padX = Math.round(W * 0.10);
    const maxW = W - padX * 2;

    ctx.font = `${QUOTE_PX}px "Courier Prime", "Courier New", monospace`;
    const lines = wrapByWidth(ctx, (quote.text || '').trim(), maxW);

    ctx.font = `${ATTRIB_PX}px "Courier Prime", "Courier New", monospace`;
    const attribLines = wrapByWidth(ctx, '— ' + (quote.author || 'Unknown'), maxW);

    const quoteLH  = Math.round(QUOTE_PX * 1.55);
    const attribLH = Math.round(ATTRIB_PX * 1.55);
    const gap      = Math.round(QUOTE_PX * 0.95);

    // anchor block in the lower middle — lock-screen clocks rarely reach this band
    const blockTop = Math.round(H * 0.60);

    ctx.font = `${QUOTE_PX}px "Courier Prime", "Courier New", monospace`;
    ctx.fillStyle = quiet;
    lines.forEach((line, i) => ctx.fillText(line, padX, blockTop + i * quoteLH));

    const attribTop = blockTop + lines.length * quoteLH + gap;
    ctx.font = `${ATTRIB_PX}px "Courier Prime", "Courier New", monospace`;
    ctx.fillStyle = faint;
    attribLines.forEach((line, i) => ctx.fillText(line, padX, attribTop + i * attribLH));

    return canvas.toDataURL('image/png');
  }

  function wrapByWidth(ctx, text, maxW) {
    const words = String(text).split(/\s+/);
    const out = [];
    let line = '';
    for (const w of words) {
      const test = line ? line + ' ' + w : w;
      if (ctx.measureText(test).width <= maxW) line = test;
      else { if (line) out.push(line); line = w; }
    }
    if (line) out.push(line);
    return out;
  }

  function quoteSlug(q) {
    const base = (q && (q.author || q.text) || 'quote');
    return base.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 32) || 'quote';
  }

  async function shareCurrentQuote() {
    if (!activeQuote) return;
    try {
      const dataUrl = await renderQuoteWallpaper(activeQuote);
      if (window.typeAPI && typeof window.typeAPI.shareImage === 'function') {
        const res = await window.typeAPI.shareImage({ dataUrl, slug: quoteSlug(activeQuote) });
        if (!res || !res.ok) console.warn('share failed:', res && res.error);
      } else {
        console.warn('shareImage bridge not available');
      }
    } catch (e) {
      console.warn('share error:', e);
    }
  }
  quoteShare.addEventListener('click', shareCurrentQuote);

  /* ================= HINTS ================= */
  // inverted: typing hides the controls (just thoughts); a pause brings them back.
  function nudgeHints() {
    if (settingsEl.hidden) hints.classList.add('dim');     // hide while typing
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => { if (phase === 'writing') hints.classList.remove('dim'); }, 1300);
  }

  /* ================= INPUT ================= */
  const NAV = ['ArrowUp','ArrowLeft','ArrowDown','ArrowRight','Home','End','PageUp','PageDown'];

  /* ================= PASTE ================= */
  // ⌘V types the clipboard onto the page. On the writing line it flows through
  // the same wrap-and-commit path as typing, so long passages land exactly as
  // if you'd typed them. With the cursor up on an editable page it inserts at
  // the cursor — newlines become spaces, and the line stops at the margin.
  // On a locked page (editable off) the cursor takes no new ink, same as typing.
  let pasting = false;
  function pasteText(text) {
    if (!text || frozen || phase !== 'writing') return;
    if (quotePlaying) { if (quoteSkip) quoteSkip(); else return; }
    text = text.replace(/\r\n?/g, '\n').replace(/\t/g, '  ');
    if (cursor) {
      if (!settings.editable) return;
      const i = cursor.line, t = locked[i];
      const ins = text.replace(/\s*\n\s*/g, ' ').slice(0, Math.max(0, MAX_COLS - t.length));
      if (!ins) return;
      locked[i] = t.slice(0, cursor.col) + ins + t.slice(cursor.col);
      cursor.col += ins.length;
      editRefresh(i);
      nudgeHints();
      return;
    }
    pasting = true;
    try {
      for (const c of text) {
        if (c === '\n') commitLine();
        else pushChar(c);
      }
    } finally { pasting = false; }
    markTyping(); nudgeHints(); resetSmolder(); persistDraft(); ensureClock(); updateMeter();
  }
  window.addEventListener('paste', (e) => {
    e.preventDefault();
    unlockAudio();
    const text = e.clipboardData ? e.clipboardData.getData('text/plain') : '';
    pasteText(text);
  });

  // hide the mouse pointer while you're typing — comes right back the moment
  // you nudge the mouse, then re-hides after a short idle
  let cursorIdleTimer = null;
  const hideCursor = () => document.body.classList.add('cursor-idle');
  const showCursor = () => {
    document.body.classList.remove('cursor-idle');
    clearTimeout(cursorIdleTimer);
    cursorIdleTimer = setTimeout(hideCursor, 1500);
  };
  window.addEventListener('mousemove', showCursor, { passive: true });
  window.addEventListener('mousedown', showCursor, { passive: true });
  window.addEventListener('wheel',     showCursor, { passive: true });

  window.addEventListener('keydown', (e) => {
    const mod = e.metaKey || e.ctrlKey;
    // iOS: printable keys and ⌫ arrive through beforeinput on the hidden
    // field — skip them here so they don't land twice. Enter and arrows only
    // come through keydown, so those stay.
    if (mobileInput && e.target === mobileInput && !mod &&
        (e.key.length === 1 || e.key === 'Backspace')) return;
    unlockAudio();
    if (!mod && e.key.length === 1) hideCursor();      // any printable keystroke tucks the pointer away

    if (e.key === 'Escape') {
      if (!settingsEl.hidden) { e.preventDefault(); settingsEl.hidden = true; return; }
      if (feedbackMode) { e.preventDefault(); exitFeedbackMode(false); return; }
      if (cursor) { e.preventDefault(); exitOverstrike(); return; }
      // exit Zen mode if currently in it — macOS native fullscreen doesn't
      // respond to Esc by default, so we wire it here explicitly
      if (settings.zen) {
        e.preventDefault();
        settings.zen = false;
        boxes.zen.checked = false;
        saveSettings();
        applyZen();
        return;
      }
      return;
    }
    if (e.ctrlKey && (e.key === 'm' || e.key === 'M')) { e.preventDefault(); setSound(!settings.sound); return; }
    // ⌘⇧F toggles Zen. macOS's system "Toggle Full Screen" (⌃⌘F) still works
    // as a backup via the menu — main process keeps settings + checkbox in sync.
    if (e.metaKey && e.shiftKey && (e.key === 'f' || e.key === 'F')) {
      e.preventDefault();
      settings.zen = !settings.zen;
      boxes.zen.checked = settings.zen;
      saveSettings();
      applyZen();
      return;
    }
    if (mod && e.key === ',') { e.preventDefault(); toggleSettings(); return; }
    if (mod && (e.key === 's' || e.key === 'S')) {
      e.preventDefault();
      if (feedbackMode) sendFeedback(); else save();
      return;
    }
    if (mod && (e.key === 'b' || e.key === 'B')) {
      e.preventDefault();
      if (feedbackMode) return;   // burn is meaningless in feedback mode
      burn();
      return;
    }
    if (mod && (e.key === 'Backspace' || e.key === 'Delete')) {
      e.preventDefault();
      if (frozen || phase !== 'writing') return;
      // ⌘⌫ wipes the current (still-uncommitted) line — committed lines stay locked
      if (current.length > 0) { current = ''; renderActive(); thock(); }
      markTyping(); nudgeHints(); resetSmolder(); persistDraft(); updateMeter();
      return;
    }
    if (frozen) return;
    // ⌘-arrows (and ⌃-arrows) are cursor navigation, not commands — let them
    // through to the cursor before the catch-all below swallows them
    if (mod && NAV.includes(e.key)) {
      e.preventDefault();
      if (!quotePlaying && phase === 'writing') moveOverstrike(e.key, e);
      return;
    }
    if (mod) return;

    if (phase === 'intro') {
      if (!introPlayed) { playIntro(); return; }
      if (e.key === 'Enter' || e.key === 'Backspace' || e.key.length === 1) skipIntro();
      else return;
    }

    if (NAV.includes(e.key)) {
      e.preventDefault();
      // ↑ lifts the cursor onto the line above; ←↑↓→ scrub across committed lines
      if (!quotePlaying) moveOverstrike(e.key, e);
      return;
    }

    // while the cursor sits on a prior line, only 'x' covers it; Enter exits; ⌫ scrubs left without deleting.
    // on an editable page the same cursor just edits: type to insert, ⌫ to delete.
    if (cursor) {
      if (e.key === 'Enter') { e.preventDefault(); exitOverstrike(); return; }
      if (settings.editable) {
        if (e.key === 'Backspace') { e.preventDefault(); editDelete(); return; }
        if (e.key.length === 1) { e.preventDefault(); editInsert(e.key); return; }
        return;
      }
      if (e.key === 'Backspace') {
        e.preventDefault();
        overstrikeScrub();
        return;
      }
      if (e.key === 'x' || e.key === 'X') { e.preventDefault(); overstrikeAt(cursor.line, cursor.col); return; }
      if (e.key.length === 1) { e.preventDefault(); return; }   // ignore any other typed char — the page is locked, only x covers
      return;
    }

    // a keystroke finishes a quote that's still typing itself in, then you carry on
    if (quotePlaying && (e.key === 'Enter' || e.key === 'Backspace' || e.key.length === 1)) quoteSkip();

    if (e.key === 'Enter') { e.preventDefault(); commitLine(); markTyping(); nudgeHints(); resetSmolder(); persistDraft(); ensureClock(); updateMeter(); return; }

    if (e.key === 'Backspace') {
      e.preventDefault();
      if (current.length > 0) {
        if (e.altKey) current = current.replace(/\S+\s*$/, '');     // ⌥⌫ — drop the previous word, keep the space before it
        else current = current.slice(0, -1);                          // plain ⌫ — drop one character
        renderActive(); thock();
      }
      markTyping(); nudgeHints(); resetSmolder(); persistDraft(); updateMeter();
      return;
    }

    if (e.key.length === 1) {
      e.preventDefault();
      pushChar(e.key);
      thock();
      markTyping();
      nudgeHints();
      resetSmolder();
      persistDraft();
      ensureClock();
      updateMeter();
    }
  });

  window.addEventListener('mousedown', (e) => {
    unlockAudio();
    if (hintSettings.contains(e.target) || settingsEl.contains(e.target)) return;   // don't let settings clicks skip the intro
    if (phase === 'intro') { if (!introPlayed) playIntro(); else skipIntro(); }
  });
  window.addEventListener('resize', () => { computeCols(); reflowLocked(); layout(); });

  /* ================= TOUCH / HINT BUTTONS ================= */
  // the hint words are real buttons everywhere — tap or click keep, burn,
  // send, cancel instead of (or as well as) the shortcuts
  document.getElementById('hintKeep').addEventListener('click', () => { if (!feedbackMode) save(); });
  document.getElementById('hintBurn').addEventListener('click', () => { if (!feedbackMode) burn(); });
  document.getElementById('hintSend').addEventListener('click', () => sendFeedback());
  document.getElementById('hintCancel').addEventListener('click', () => exitFeedbackMode(false));

  // editable page: click or tap a committed line to put the cursor right there
  feed.addEventListener('click', (e) => {
    if (!settings.editable || frozen || phase !== 'writing' || quotePlaying) return;
    const lineEl = e.target.closest ? e.target.closest('.line') : null;
    if (!lineEl || lineEl.parentElement !== feed) return;
    const idx = Array.prototype.indexOf.call(feed.children, lineEl);
    if (idx < 0) return;
    if (idx >= locked.length) { if (cursor) exitOverstrike(); return; }   // the writing line
    let col = locked[idx].length;
    const chs = lineEl.querySelectorAll('.ch');
    for (let k = 0; k < chs.length; k++) {
      const r = chs[k].getBoundingClientRect();
      if (r.width && e.clientX < r.left + r.width / 2) { col = k; break; }
    }
    const prev = cursor ? cursor.line : null;
    cursor = { line: idx, col: Math.max(markerLen(idx), Math.min(col, locked[idx].length)) };
    stage.classList.add('overstriking');
    if (prev !== null && prev !== idx) renderLockedLine(prev);
    renderLockedLine(idx); layout();
  });

  /* ================= iOS (the iPhone app) ================= */
  // The native shell injects typeAPI with isIOS — that flips on the touch
  // layer: a hidden field summons the keyboard and routes everything typed
  // into the same paths the desktop keydown handler uses, and the visual
  // viewport drives the strike point so the page sits above the keys.
  const isIOS = !!(window.typeAPI && window.typeAPI.isIOS);
  let mobileInput = null;
  if (isIOS) (function setupIOS() {
    const dbg = (m) => { if (window.typeAPI.debug && window.typeAPI.log) window.typeAPI.log(m); };
    dbg('=== launch v' + (window.typeAPI.version || '?') + ' at ' + new Date().toISOString());
    document.body.classList.add('ios');
    // settings rides the top corner on glass as a quiet gear; keep & burn
    // stay alone at the bottom
    (function liftSettingsHint() {
      const hn = document.getElementById('hintsNormal');
      const seps = hn.querySelectorAll('.sep');
      if (seps.length) seps[seps.length - 1].remove();
      hintSettings.classList.add('ios-settings');
      hintSettings.innerHTML = '<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-label="settings"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';
      document.body.appendChild(hintSettings);
    })();
    const mv = document.querySelector('meta[name="viewport"]');
    if (mv) mv.setAttribute('content', 'width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover');
    window.addEventListener('gesturestart', (e) => e.preventDefault());   // no pinch zoom

    const syncViewport = () => {
      const vv = window.visualViewport;
      document.documentElement.style.setProperty('--vvh', (vv ? vv.height : window.innerHeight) + 'px');
      document.documentElement.style.setProperty('--vvt', (vv ? vv.offsetTop : 0) + 'px');
      computeCols(); reflowLocked(); layout();
    };
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', syncViewport);
      window.visualViewport.addEventListener('scroll', syncViewport);
    }
    syncViewport();

    // The invisible field keeps the tail of the line you're typing, so iOS
    // autocorrect, spell check, QuickPath and dictation have real text to
    // work against. The page replays whatever changes in the field — an OS
    // correction lands as backspaces + the fixed word, same as typing it.
    mobileInput = document.createElement('input');
    mobileInput.id = 'mobileInput';
    mobileInput.type = 'text';
    mobileInput.setAttribute('autocomplete', 'off');
    mobileInput.setAttribute('autocorrect', 'on');
    mobileInput.setAttribute('autocapitalize', 'sentences');
    mobileInput.setAttribute('spellcheck', 'true');
    mobileInput.setAttribute('enterkeyhint', 'enter');
    document.body.appendChild(mobileInput);
    const PREFIX = '\u200b';            // zero-width space: never-empty head: ⌫ always changes the value
    let fieldLast = PREFIX;
    const caretToEnd = () => { try { mobileInput.setSelectionRange(mobileInput.value.length, mobileInput.value.length); } catch (err) {} };
    const fieldReset = (text) => {
      mobileInput.value = fieldLast = PREFIX + (text || '');
      caretToEnd();
    };
    const fieldTrim = () => {                // a line's tail is plenty of context — don't grow forever
      if (mobileInput.value.length > 90) fieldReset(mobileInput.value.slice(-45).replace(/^\S*\s/, '').replace(/\u200b/g, ''));
    };
    fieldReset('');

    // the input covers the page, so a tap on the paper is a real tap on a
    // text field — iOS focuses it and presents the keyboard natively. Taps
    // pass through to whatever sits underneath (lines for cursor placement,
    // the intro skip, the quote ×) by re-dispatching the click below the
    // input. Controls (hints, settings, update) layer above it and never
    // reach this handler.
    mobileInput.addEventListener('click', (e) => {
      mobileInput.style.pointerEvents = 'none';
      const under = document.elementFromPoint(e.clientX, e.clientY);
      mobileInput.style.pointerEvents = '';
      if (under && under !== mobileInput) {
        under.dispatchEvent(new MouseEvent('click', { clientX: e.clientX, clientY: e.clientY, bubbles: true }));
      }
      dbg('tap: focused=' + (document.activeElement === mobileInput));
    });

    const skipOrPlayIntro = () => {
      if (phase !== 'intro') return false;
      if (!introPlayed) playIntro(); else skipIntro();
      return true;
    };
    const haptic = (kind) => { if (window.typeAPI.haptic) window.typeAPI.haptic(kind); };
    const touchChar = (c) => {
      if (skipOrPlayIntro()) { dbg('drop (intro) ' + JSON.stringify(c)); return; }
      if (frozen) { dbg('drop (frozen) ' + JSON.stringify(c)); return; }
      haptic('key');
      if (cursor) {
        if (settings.editable) editInsert(c);
        else if (c === 'x' || c === 'X') overstrikeAt(cursor.line, cursor.col);
        return;
      }
      if (quotePlaying && quoteSkip) quoteSkip();
      pushChar(c); thock(); markTyping(); nudgeHints(); resetSmolder(); persistDraft(); ensureClock(); updateMeter();
      dbg('typed ' + JSON.stringify(c) + ' current=' + JSON.stringify(current));
    };
    const touchEnter = () => {
      if (skipOrPlayIntro() || frozen) return;
      haptic('return');
      if (cursor) { exitOverstrike(); return; }
      if (quotePlaying && quoteSkip) quoteSkip();
      commitLine(); markTyping(); nudgeHints(); resetSmolder(); persistDraft(); ensureClock(); updateMeter();
    };
    const touchBackspace = (word) => {
      if (skipOrPlayIntro() || frozen) return;
      haptic('key');
      if (cursor) { if (settings.editable) editDelete(); else overstrikeScrub(); return; }
      if (quotePlaying && quoteSkip) quoteSkip();
      if (current.length > 0) {
        current = word ? current.replace(/\S+\s*$/, '') : current.slice(0, -1);
        renderActive(); thock();
      }
      markTyping(); nudgeHints(); resetSmolder(); persistDraft(); updateMeter();
    };

    // Read what the keyboard actually did to the field, not what an event
    // claims it will do: diff the value against what it held last time and
    // replay the difference onto the page. Autocorrect fixing "teh" → "the"
    // arrives as 3 deletions + "the" — identical to a person retyping it.
    // Survives every input engine: taps, QuickPath, dictation, hardware keys.
    const handleFieldChange = () => {
      const v = mobileInput.value;
      if (v === fieldLast) return;
      unlockAudio();
      let p = 0;
      while (p < v.length && p < fieldLast.length && v[p] === fieldLast[p]) p++;
      let s = 0;
      while (s < v.length - p && s < fieldLast.length - p &&
             v[v.length - 1 - s] === fieldLast[fieldLast.length - 1 - s]) s++;
      const deleted = fieldLast.length - p - s;
      const inserted = v.slice(p, v.length - s);
      dbg('input: del=' + deleted + ' ins=' + JSON.stringify(inserted));
      fieldLast = v;
      for (let i = 0; i < deleted; i++) touchBackspace(false);
      for (const c of inserted) { if (c === '\n') touchEnter(); else touchChar(c); }
      if (!mobileInput.value.startsWith(PREFIX)) fieldReset(mobileInput.value);  // ⌫ ate the head — restore it
      fieldTrim();
    };
    mobileInput.addEventListener('input', handleFieldChange);
    // Enter doesn't change a single-line field — the window keydown handler
    // commits the page line; the field just starts its context fresh
    mobileInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') setTimeout(() => fieldReset(''), 0);
    });
    // paste lands via the window-level paste handler; resync the field after
    mobileInput.addEventListener('paste', () => { setTimeout(() => fieldReset(current), 0); });
    // the page is append-only — a stray caret move would desync the replay
    mobileInput.addEventListener('focus', caretToEnd);
    if (window.typeAPI && window.typeAPI.debug && window.typeAPI.log) {
      ['focus', 'blur', 'keydown', 'beforeinput', 'compositionstart', 'compositionend'].forEach(ev => {
        mobileInput.addEventListener(ev, (e) => {
          window.typeAPI.log(ev + (e.key ? ' key=' + e.key : '') + (e.inputType ? ' type=' + e.inputType : '') + (typeof e.data === 'string' ? ' data=' + JSON.stringify(e.data) : ''));
        });
      });
    }

    // Phones interrupt — a notification or app switch is not "stopping".
    // The smolder clock only runs while type is actually in front of you,
    // and "Burn if I stop" starts OFF on the phone's first run: opt in,
    // don't ambush. (Settings carried over from before keep their choice.)
    if (localStorage.getItem('type.settings') === null) {
      settings.smolder = false;
      boxes.smolder.checked = false;
      updateBurnAfter();
      saveSettings();
    }
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) coolSmolder(); else scheduleSmolder();
    });

    // swipe down on the paper tucks the keyboard away to sit back and read;
    // any tap brings it right back
    let swipeStart = null;
    mobileInput.addEventListener('touchstart', (e) => {
      swipeStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: true });
    mobileInput.addEventListener('touchmove', (e) => {
      if (!swipeStart) return;
      const dy = e.touches[0].clientY - swipeStart.y;
      const dx = Math.abs(e.touches[0].clientX - swipeStart.x);
      if (dy > 70 && dx < 50) { swipeStart = null; mobileInput.blur(); }
    }, { passive: true });

    // keep and burn land with weight you can feel
    document.getElementById('hintKeep').addEventListener('click', () => {
      if (!frozen && phase === 'writing' && !feedbackMode) haptic('keep');
    });
    document.getElementById('hintBurn').addEventListener('click', () => {
      if (!frozen && phase === 'writing' && !feedbackMode) haptic('burn');
    });

    // tell the shell the paper color, so the status bar and the next
    // launch's backdrop match the theme instead of flashing white
    const syncShellTheme = () => {
      if (!window.typeAPI.setShellTheme) return;
      const bg = getComputedStyle(document.body).getPropertyValue('--paper').trim();
      window.typeAPI.setShellTheme({ bg, dark: !!(settings.dark || settings.amber) });
    };
    themePick.addEventListener('click', () => setTimeout(syncShellTheme, 0));
    syncShellTheme();

    // settings, tuned for the phone: no Zen (the app is already the whole
    // screen), no wallpaper share yet, and saves are a fact, not a chooser
    const zenRow = boxes.zen.closest('.setrow'); if (zenRow) zenRow.hidden = true;
    quoteShare.remove();
    document.getElementById('saveDiv').hidden = false;
    document.getElementById('saveTitle').hidden = false;
    rowSaveFolder.hidden = false;
    saveFolderLabel.textContent = 'iCloud Drive · type';
    rowSaveFolder.style.cursor = 'default';
    const pickLabel = rowSaveFolder.querySelector('.setpick'); if (pickLabel) pickLabel.hidden = true;
    const saveTip = document.getElementById('saveTitle').querySelector('.tip');
    if (saveTip) saveTip.textContent = 'Kept pages land in iCloud Drive → type as plain markdown — in the Files app, synced everywhere iCloud goes. No account, just your iCloud.';
  })();

  computeCols();
  const recovered = readDraft();
  if (recovered && (recovered.locked.length || recovered.current)) {
    restoreDraft(recovered);
  } else {
    // Defer the intro until the main process has actually shown the window,
    // so the user sees "type." typing out from the first frame instead of
    // catching it mid-animation. Fallback fires if the IPC never lands
    // (browser preview, dev reload, etc.) so the intro still plays.
    let started = false;
    const start = () => { if (!started) { started = true; runIntro(); } };
    if (window.typeAPI && window.typeAPI.onReady) {
      window.typeAPI.onReady(start);
      setTimeout(start, 1500);   // safety net
    } else {
      start();
    }
  }
})();
</script>
</body>
</html>
